<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Music Player</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
    
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      -webkit-touch-callout: none;
    }
    
    input, textarea {
      user-select: text;
      -webkit-user-select: text;
      -moz-user-select: text;
      -ms-user-select: text;
    }

    html, body { 
      background: #000; 
      height: 100dvh; 
      font-family: 'Inter', -apple-system, sans-serif; 
      color: #fff; 
      -webkit-font-smoothing: antialiased; 
      overflow: hidden; 
    }
    
    #root { height: 100%; width: 100%; }
    .flat-card { background: #121212; border: 1px solid #222; border-radius: 20px; }
    
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      background: #333;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fc3c44;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // --- IndexedDB Database Operations ---
    const DB_NAME = "cold_engine_db";
    const DB_VERSION = 2;

    const initDB = () => {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains("tracks")) {
            db.createObjectStore("tracks", { keyPath: "id" });
          }
          if (!db.objectStoreNames.contains("playlists")) {
            db.createObjectStore("playlists", { keyPath: "id" });
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    };

    const saveTracksToDB = async (tracks) => {
      const db = await initDB();
      const tx = db.transaction("tracks", "readwrite");
      const store = tx.objectStore("tracks");
      await store.clear();
      tracks.forEach(track => store.put(track));
    };

    const getTracksFromDB = async () => {
      const db = await initDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction("tracks", "readonly");
        const store = tx.objectStore("tracks");
        const req = store.getAll();
        req.onsuccess = () => resolve(req.result || []);
        req.onerror = () => reject(req.error);
      });
    };

    const savePlaylistsToDB = async (playlists) => {
      const db = await initDB();
      const tx = db.transaction("playlists", "readwrite");
      const store = tx.objectStore("playlists");
      await store.clear();
      playlists.forEach(pl => store.put(pl));
    };

    const getPlaylistsFromDB = async () => {
      const db = await initDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction("playlists", "readonly");
        const store = tx.objectStore("playlists");
        const req = store.getAll();
        req.onsuccess = () => resolve(req.result || []);
        req.onerror = () => reject(req.error);
      });
    };

    function MusicPlayer() {
      // Audio & State
      const audioRef = React.useRef(new Audio());
      const audioCtxRef = React.useRef(null);
      const filtersRef = React.useRef([]);

      const [tracks, setTracks] = React.useState([]);
      const [playlists, setPlaylists] = React.useState([]);
      const [activePlaylistId, setActivePlaylistId] = React.useState(null);

      const [currentTrackIndex, setCurrentTrackIndex] = React.useState(null);
      const [isPlaying, setIsPlaying] = React.useState(false);
      const [currentTime, setCurrentTime] = React.useState(0);
      const [duration, setDuration] = React.useState(0);
      const [volume, setVolume] = React.useState(1);

      const [view, setView] = React.useState('library'); // 'library', 'playlists', 'playlist-detail', 'player', 'eq', 'settings'
      const [searchTerm, setSearchTerm] = React.useState('');
      const [isShuffle, setIsShuffle] = React.useState(false);
      const [repeatMode, setRepeatMode] = React.useState('off'); // 'off', 'all', 'one'
      const [showLyrics, setShowLyrics] = React.useState(false);

      // Drag & Drop State
      const [draggedIndex, setDraggedIndex] = React.useState(null);
      const [dragOverInfo, setDragOverInfo] = React.useState(null); // { index: number, position: 'above' | 'below' }

      // Equalizer Bands
      const [eqBands, setEqBands] = React.useState([
        { label: "60Hz", val: 0 },
        { label: "230Hz", val: 0 },
        { label: "910Hz", val: 0 },
        { label: "4kHz", val: 0 },
        { label: "14kHz", val: 0 }
      ]);

      // Modals
      const [showAddToPlaylistModal, setShowAddToPlaylistModal] = React.useState(false);
      const [trackToAddToPlaylist, setTrackToAddToPlaylist] = React.useState(null);
      const [showCreatePlaylistModal, setShowCreatePlaylistModal] = React.useState(false);
      const [newPlaylistName, setNewPlaylistName] = React.useState('');
      const [confirmClear, setConfirmClear] = React.useState(false);

      // Initialize Data
      React.useEffect(() => {
        (async () => {
          try {
            const savedTracks = await getTracksFromDB();
            if (savedTracks && savedTracks.length > 0) setTracks(savedTracks);
            
            const savedPlaylists = await getPlaylistsFromDB();
            if (savedPlaylists && savedPlaylists.length > 0) setPlaylists(savedPlaylists);
          } catch (e) {
            console.error("Fehler beim Laden der Datenbank:", e);
          }
        })();
      }, []);

      // Audio Context Initialization
      const initAudioContext = () => {
        if (!audioCtxRef.current) {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          const ctx = new AudioContext();
          audioCtxRef.current = ctx;

          const source = ctx.createMediaElementSource(audioRef.current);
          const freqs = [60, 230, 910, 4000, 14000];
          const filters = freqs.map((freq) => {
            const filter = ctx.createBiquadFilter();
            filter.type = freq <= 230 ? "lowshelf" : freq >= 4000 ? "highshelf" : "peaking";
            filter.frequency.value = freq;
            filter.gain.value = 0;
            return filter;
          });

          source.connect(filters[0]);
          for (let i = 0; i < filters.length - 1; i++) {
            filters[i].connect(filters[i + 1]);
          }
          filters[filters.length - 1].connect(ctx.destination);
          filtersRef.current = filters;
        }
        if (audioCtxRef.current.state === "suspended") {
          audioCtxRef.current.resume();
        }
      };

      // Audio Event Listeners
      React.useEffect(() => {
        const audio = audioRef.current;
        const handleTimeUpdate = () => setCurrentTime(audio.currentTime);
        const handleLoadedMetadata = () => setDuration(audio.duration);
        const handleEnded = () => handleNextTrack();

        audio.addEventListener('timeupdate', handleTimeUpdate);
        audio.addEventListener('loadedmetadata', handleLoadedMetadata);
        audio.addEventListener('ended', handleEnded);

        return () => {
          audio.removeEventListener('timeupdate', handleTimeUpdate);
          audio.removeEventListener('loadedmetadata', handleLoadedMetadata);
          audio.removeEventListener('ended', handleEnded);
        };
      }, [currentTrackIndex, tracks, activePlaylistId, repeatMode, isShuffle]);

      const getCurrentQueue = () => {
        if (view === 'playlist-detail' || activePlaylistId) {
          const pl = playlists.find(p => p.id === activePlaylistId);
          if (pl) {
            return pl.trackIds.map(id => tracks.find(t => t.id === id)).filter(Boolean);
          }
        }
        return tracks;
      };

      const playTrack = (index, playlistId = null) => {
        initAudioContext();
        setActivePlaylistId(playlistId);
        setCurrentTrackIndex(index);

        let queue = tracks;
        if (playlistId) {
          const pl = playlists.find(p => p.id === playlistId);
          if (pl) queue = pl.trackIds.map(id => tracks.find(t => t.id === id)).filter(Boolean);
        }

        const track = queue[index];
        if (track && track.fileData) {
          audioRef.current.src = track.fileData;
          audioRef.current.play().then(() => setIsPlaying(true)).catch(console.error);
        }
      };

      const togglePlay = () => {
        initAudioContext();
        if (currentTrackIndex === null && tracks.length > 0) {
          playTrack(0);
          return;
        }
        if (isPlaying) {
          audioRef.current.pause();
          setIsPlaying(false);
        } else {
          audioRef.current.play().then(() => setIsPlaying(true)).catch(console.error);
        }
      };

      const handleNextTrack = () => {
        const queue = getCurrentQueue();
        if (queue.length === 0) return;

        if (repeatMode === 'one') {
          audioRef.current.currentTime = 0;
          audioRef.current.play();
          return;
        }

        let nextIdx;
        if (isShuffle) {
          nextIdx = Math.floor(Math.random() * queue.length);
        } else {
          nextIdx = (currentTrackIndex + 1) % queue.length;
        }
        playTrack(nextIdx, activePlaylistId);
      };

      const handlePrevTrack = () => {
        const queue = getCurrentQueue();
        if (queue.length === 0) return;

        let prevIdx = currentTrackIndex - 1;
        if (prevIdx < 0) prevIdx = queue.length - 1;
        playTrack(prevIdx, activePlaylistId);
      };

      const handleSeek = (e) => {
        const time = parseFloat(e.target.value);
        audioRef.current.currentTime = time;
        setCurrentTime(time);
      };

      const handleVolumeChange = (e) => {
        const vol = parseFloat(e.target.value);
        setVolume(vol);
        audioRef.current.volume = vol;
      };

      const handleEQChange = (index, val) => {
        const updated = [...eqBands];
        updated[index].val = val;
        setEqBands(updated);
        if (filtersRef.current[index]) {
          filtersRef.current[index].gain.value = val;
        }
      };

      // File Import (Audio / Metadata)
      const handleFileUpload = (e) => {
        const files = Array.from(e.target.files);
        if (!files.length) return;

        files.forEach(file => {
          const reader = new FileReader();
          reader.onload = (event) => {
            const track = {
              id: Date.now() + "_" + Math.random().toString(36).substring(2, 7),
              title: file.name.replace(/\.[^/.]+$/, ""),
              artist: "Unbekannter Künstler",
              album: "Unbekanntes Album",
              duration: 0,
              fileData: event.target.result,
              cover: null,
              isFavorite: false
            };

            setTracks(prev => {
              const updated = [...prev, track];
              saveTracksToDB(updated);
              return updated;
            });
          };
          reader.readAsDataURL(file);
        });
      };

      const deleteTrack = (id) => {
        setTracks(prev => {
          const updated = prev.filter(t => t.id !== id);
          saveTracksToDB(updated);
          return updated;
        });
        // Remove from playlists as well
        setPlaylists(prev => {
          const updated = prev.map(pl => ({
            ...pl,
            trackIds: pl.trackIds.filter(tId => tId !== id)
          }));
          savePlaylistsToDB(updated);
          return updated;
        });
      };

      const toggleFavorite = (id) => {
        setTracks(prev => {
          const updated = prev.map(t => t.id === id ? { ...t, isFavorite: !t.isFavorite } : t);
          saveTracksToDB(updated);
          return updated;
        });
      };

      // Playlist Management
      const createPlaylist = () => {
        if (!newPlaylistName.trim()) return;
        const newPl = {
          id: "pl_" + Date.now(),
          name: newPlaylistName.trim(),
          trackIds: [],
          cover: null
        };
        setPlaylists(prev => {
          const updated = [...prev, newPl];
          savePlaylistsToDB(updated);
          return updated;
        });
        setNewPlaylistName('');
        setShowCreatePlaylistModal(false);
      };

      const addTrackToPlaylist = (playlistId, trackId) => {
        setPlaylists(prev => {
          const updated = prev.map(pl => {
            if (pl.id === playlistId && !pl.trackIds.includes(trackId)) {
              return { ...pl, trackIds: [...pl.trackIds, trackId] };
            }
            return pl;
          });
          savePlaylistsToDB(updated);
          return updated;
        });
        setShowAddToPlaylistModal(false);
      };

      const removeTrackFromPlaylist = (playlistId, trackId) => {
        setPlaylists(prev => {
          const updated = prev.map(pl => {
            if (pl.id === playlistId) {
              return { ...pl, trackIds: pl.trackIds.filter(id => id !== trackId) };
            }
            return pl;
          });
          savePlaylistsToDB(updated);
          return updated;
        });
      };

      const deletePlaylist = (playlistId) => {
        setPlaylists(prev => {
          const updated = prev.filter(pl => pl.id !== playlistId);
          savePlaylistsToDB(updated);
          return updated;
        });
        if (activePlaylistId === playlistId) {
          setActivePlaylistId(null);
          setView('playlists');
        }
      };

      // Backup & Restore
      const exportBackup = () => {
        const data = JSON.stringify({ tracks, playlists });
        const blob = new Blob([data], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `music_player_backup_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
      };

      const importBackup = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (data.tracks) {
              setTracks(data.tracks);
              saveTracksToDB(data.tracks);
            }
            if (data.playlists) {
              setPlaylists(data.playlists);
              savePlaylistsToDB(data.playlists);
            }
            alert("Backup erfolgreich wiederhergestellt!");
          } catch (err) {
            alert("Fehler beim Importieren des Backups.");
          }
        };
        reader.readAsText(file);
      };

      const clearLibrary = async () => {
        setTracks([]);
        setPlaylists([]);
        const db = await initDB();
        const tx = db.transaction(["tracks", "playlists"], "readwrite");
        await tx.objectStore("tracks").clear();
        await tx.objectStore("playlists").clear();
        setConfirmClear(false);
      };

      // --- Precise Drag & Drop Implementation ---
      const handleDragStart = (e, index) => {
        setDraggedIndex(index);
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', index.toString());
      };

      const handleDragOver = (e, index) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';

        const rect = e.currentTarget.getBoundingClientRect();
        const midY = rect.top + rect.height / 2;
        const position = e.clientY < midY ? 'above' : 'below';

        setDragOverInfo({ index, position });
      };

      const handleDrop = (e, dropIndex, listType) => {
        e.preventDefault();
        e.stopPropagation();

        if (draggedIndex === null || dragOverInfo === null) return;

        const position = dragOverInfo.position;
        let targetPos = position === 'above' ? dropIndex : dropIndex + 1;

        if (listType === 'library') {
          const updated = [...tracks];
          const [movedItem] = updated.splice(draggedIndex, 1);
          let insertAt = targetPos;
          if (draggedIndex < targetPos) {
            insertAt = targetPos - 1;
          }
          updated.splice(insertAt, 0, movedItem);
          setTracks(updated);
          saveTracksToDB(updated);
        } else if (listType === 'playlist') {
          const pl = playlists.find(p => p.id === activePlaylistId);
          if (pl) {
            const updatedTrackIds = [...pl.trackIds];
            const [movedId] = updatedTrackIds.splice(draggedIndex, 1);
            let insertAt = targetPos;
            if (draggedIndex < targetPos) {
              insertAt = targetPos - 1;
            }
            updatedTrackIds.splice(insertAt, 0, movedId);
            const updatedPlaylists = playlists.map(p => 
              p.id === activePlaylistId ? { ...p, trackIds: updatedTrackIds } : p
            );
            setPlaylists(updatedPlaylists);
            savePlaylistsToDB(updatedPlaylists);
          }
        }

        setDraggedIndex(null);
        setDragOverInfo(null);
      };

      const handleDragEnd = () => {
        setDraggedIndex(null);
        setDragOverInfo(null);
      };

      // Helpers
      const formatTime = (secs) => {
        if (isNaN(secs) || secs === 0) return "0:00";
        const m = Math.floor(secs / 60);
        const s = Math.floor(secs % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
      };

      const currentQueue = getCurrentQueue();
      const currentTrack = currentQueue[currentTrackIndex] || null;

      const filteredTracks = tracks.filter(t => 
        t.title.toLowerCase().includes(searchTerm.toLowerCase()) || 
        t.artist.toLowerCase().includes(searchTerm.toLowerCase())
      );

      const activePlaylist = playlists.find(p => p.id === activePlaylistId);
      const activePlaylistTracks = activePlaylist 
        ? activePlaylist.trackIds.map(id => tracks.find(t => t.id === id)).filter(Boolean)
        : [];

      return (
        <div style={{ display: "flex", flexDirection: "column", height: "100dvh", width: "100%", background: "#000" }}>
          
          {/* Top Bar Navigation */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 20px", borderBottom: "1px solid #1a1a1a" }}>
            <div style={{ fontWeight: 800, fontSize: 18, color: "#fff", letterSpacing: "-0.02em" }}>
              Music
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              {['library', 'playlists', 'player', 'eq', 'settings'].map(tab => (
                <button
                  key={tab}
                  onClick={() => setView(tab)}
                  style={{
                    background: view === tab ? "#fc3c44" : "#121212",
                    color: view === tab ? "#fff" : "#888",
                    border: "none",
                    borderRadius: 12,
                    padding: "8px 14px",
                    fontSize: 12,
                    fontWeight: 600,
                    cursor: "pointer",
                    textTransform: "capitalize"
                  }}
                >
                  {tab === 'library' ? 'Bibliothek' : tab === 'playlists' ? 'Playlists' : tab === 'player' ? 'Player' : tab === 'eq' ? 'EQ' : 'Optionen'}
                </button>
              ))}
            </div>
          </div>

          {/* Main Content Area */}
          <div style={{ flex: 1, overflowY: "auto", padding: "16px", paddingBottom: "100px" }}>
            
            {/* --- VIEW: LIBRARY --- */}
            {view === 'library' && (
              <div>
                <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
                  <input
                    type="text"
                    placeholder="Titel oder Künstler suchen..."
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                    style={{
                      flex: 1,
                      background: "#121212",
                      border: "1px solid #222",
                      borderRadius: 12,
                      padding: "10px 14px",
                      color: "#fff",
                      fontSize: 13,
                      outline: "none"
                    }}
                  />
                  <label style={{
                    background: "#fc3c44",
                    color: "#fff",
                    borderRadius: 12,
                    padding: "10px 16px",
                    fontSize: 13,
                    fontWeight: 600,
                    cursor: "pointer",
                    display: "flex",
                    alignItems: "center"
                  }}>
                    + Importieren
                    <input type="file" multiple accept="audio/*" onChange={handleFileUpload} style={{ display: "none" }} />
                  </label>
                </div>

                {filteredTracks.length === 0 ? (
                  <div style={{ textAlign: "center", color: "#555", padding: "60px 0", fontSize: 13 }}>
                    {searchTerm ? "Keine Titel gefunden" : "Keine Musik vorhanden. Klicke auf '+ Importieren' um Titel hinzuzufügen."}
                  </div>
                ) : (
                  filteredTracks.map((track, idx) => {
                    const isCurrent = currentTrackIndex === idx && !activePlaylistId;
                    const isDragged = draggedIndex === idx;
                    const isDragOver = dragOverInfo && dragOverInfo.index === idx && draggedIndex !== idx;
                    const showTopIndicator = isDragOver && dragOverInfo.position === 'above';
                    const showBottomIndicator = isDragOver && dragOverInfo.position === 'below';

                    return (
                      <div
                        key={track.id || idx}
                        draggable
                        onDragStart={(e) => handleDragStart(e, idx)}
                        onDragOver={(e) => handleDragOver(e, idx)}
                        onDrop={(e) => handleDrop(e, idx, 'library')}
                        onDragEnd={handleDragEnd}
                        className="flat-card"
                        style={{
                          display: "flex",
                          alignItems: "center",
                          padding: "10px 12px",
                          marginBottom: 8,
                          position: "relative",
                          opacity: isDragged ? 0.35 : 1,
                          cursor: "grab",
                          background: isCurrent ? "rgba(252, 60, 68, 0.08)" : "#121212",
                          borderColor: isCurrent ? "#fc3c44" : "#222"
                        }}
                      >
                        {/* Red Indicator Lines for Drop Position */}
                        {showTopIndicator && (
                          <div style={{
                            position: "absolute",
                            top: -3,
                            left: 0,
                            right: 0,
                            height: 3,
                            background: "#fc3c44",
                            borderRadius: 2,
                            boxShadow: "0 0 8px #fc3c44",
                            zIndex: 20,
                            pointerEvents: "none"
                          }} />
                        )}
                        {showBottomIndicator && (
                          <div style={{
                            position: "absolute",
                            bottom: -3,
                            left: 0,
                            right: 0,
                            height: 3,
                            background: "#fc3c44",
                            borderRadius: 2,
                            boxShadow: "0 0 8px #fc3c44",
                            zIndex: 20,
                            pointerEvents: "none"
                          }} />
                        )}

                        <div style={{ color: "#444", marginRight: 10, fontSize: 14, cursor: "grab" }}>
                          ⠿
                        </div>

                        <div 
                          onClick={() => playTrack(idx)}
                          style={{
                            width: 42,
                            height: 42,
                            borderRadius: 8,
                            background: "#222",
                            overflow: "hidden",
                            marginRight: 12,
                            flexShrink: 0,
                            display: "flex",
                            alignItems: "center",
                            justifyContent: "center",
                            cursor: "pointer"
                          }}
                        >
                          {track.cover ? (
                            <img src={track.cover} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                          ) : (
                            <span style={{ fontSize: 18, color: "#555" }}>🎵</span>
                          )}
                        </div>

                        <div onClick={() => playTrack(idx)} style={{ flex: 1, minWidth: 0, cursor: "pointer" }}>
                          <div style={{ fontWeight: 600, fontSize: 13, color: isCurrent ? "#fc3c44" : "#fff", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                            {track.title || track.name}
                          </div>
                          <div style={{ fontSize: 11, color: "#666", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", marginTop: 2 }}>
                            {track.artist || "Unbekannter Künstler"}
                          </div>
                        </div>

                        <div style={{ fontSize: 11, color: "#555", marginLeft: 8, marginRight: 8 }}>
                          {formatTime(track.duration || 0)}
                        </div>

                        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                          <button
                            onClick={(e) => { e.stopPropagation(); setTrackToAddToPlaylist(track); setShowAddToPlaylistModal(true); }}
                            title="Zu Playlist hinzufügen"
                            style={{ background: "none", border: "none", color: "#888", fontSize: 15, cursor: "pointer", padding: 4 }}
                          >
                            ➕
                          </button>
                          <button
                            onClick={(e) => { e.stopPropagation(); toggleFavorite(track.id); }}
                            title="Favorit"
                            style={{ background: "none", border: "none", color: track.isFavorite ? "#fc3c44" : "#444", fontSize: 15, cursor: "pointer", padding: 4 }}
                          >
                            ♥
                          </button>
                          <button
                            onClick={(e) => { e.stopPropagation(); deleteTrack(track.id); }}
                            title="Löschen"
                            style={{ background: "none", border: "none", color: "#444", fontSize: 13, cursor: "pointer", padding: 4 }}
                          >
                            ✕
                          </button>
                        </div>
                      </div>
                    );
                  })
                )}
              </div>
            )}

            {/* --- VIEW: PLAYLISTS LIST --- */}
            {view === 'playlists' && (
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: "#888" }}>Meine Playlists ({playlists.length})</div>
                  <button
                    onClick={() => setShowCreatePlaylistModal(true)}
                    style={{ background: "#fc3c44", color: "#fff", border: "none", borderRadius: 12, padding: "8px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}
                  >
                    + Neue Playlist
                  </button>
                </div>

                {playlists.length === 0 ? (
                  <div style={{ textAlign: "center", color: "#555", padding: "60px 0", fontSize: 13 }}>
                    Noch keine Playlists vorhanden. Erstelle eine neue Playlist!
                  </div>
                ) : (
                  playlists.map(pl => (
                    <div
                      key={pl.id}
                      onClick={() => { setActivePlaylistId(pl.id); setView('playlist-detail'); }}
                      className="flat-card"
                      style={{
                        display: "flex",
                        alignItems: "center",
                        padding: "14px",
                        marginBottom: 10,
                        cursor: "pointer"
                      }}
                    >
                      <div style={{
                        width: 48,
                        height: 48,
                        borderRadius: 10,
                        background: "#222",
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "center",
                        fontSize: 20,
                        marginRight: 14
                      }}>
                        📂
                      </div>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: 700, fontSize: 14, color: "#fff" }}>{pl.name}</div>
                        <div style={{ fontSize: 11, color: "#666", marginTop: 2 }}>{pl.trackIds.length} Titel</div>
                      </div>
                      <button
                        onClick={(e) => { e.stopPropagation(); deletePlaylist(pl.id); }}
                        style={{ background: "none", border: "none", color: "#444", fontSize: 13, cursor: "pointer", padding: 6 }}
                      >
                        ✕
                      </button>
                    </div>
                  ))
                )}
              </div>
            )}

            {/* --- VIEW: PLAYLIST DETAIL --- */}
            {view === 'playlist-detail' && activePlaylist && (
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
                  <button
                    onClick={() => setView('playlists')}
                    style={{ background: "#121212", border: "1px solid #222", color: "#fff", borderRadius: 10, padding: "6px 12px", fontSize: 12, cursor: "pointer" }}
                  >
                    ← Zurück
                  </button>
                  <div style={{ fontWeight: 800, fontSize: 18, color: "#fff" }}>{activePlaylist.name}</div>
                </div>

                {activePlaylistTracks.length === 0 ? (
                  <div style={{ textAlign: "center", color: "#555", padding: "60px 0", fontSize: 13 }}>
                    Diese Playlist ist noch leer. Füge Titel aus deiner Bibliothek hinzu!
                  </div>
                ) : (
                  activePlaylistTracks.map((track, idx) => {
                    const isCurrent = currentTrackIndex === idx && activePlaylistId === activePlaylist.id;
                    const isDragged = draggedIndex === idx;
                    const isDragOver = dragOverInfo && dragOverInfo.index === idx && draggedIndex !== idx;
                    const showTopIndicator = isDragOver && dragOverInfo.position === 'above';
                    const showBottomIndicator = isDragOver && dragOverInfo.position === 'below';

                    return (
                      <div
                        key={track.id || idx}
                        draggable
                        onDragStart={(e) => handleDragStart(e, idx)}
                        onDragOver={(e) => handleDragOver(e, idx)}
                        onDrop={(e) => handleDrop(e, idx, 'playlist')}
                        onDragEnd={handleDragEnd}
                        className="flat-card"
                        style={{
                          display: "flex",
                          alignItems: "center",
                          padding: "10px 12px",
                          marginBottom: 8,
                          position: "relative",
                          opacity: isDragged ? 0.35 : 1,
                          cursor: "grab",
                          background: isCurrent ? "rgba(252, 60, 68, 0.08)" : "#121212",
                          borderColor: isCurrent ? "#fc3c44" : "#222"
                        }}
                      >
                        {showTopIndicator && (
                          <div style={{
                            position: "absolute",
                            top: -3,
                            left: 0,
                            right: 0,
                            height: 3,
                            background: "#fc3c44",
                            borderRadius: 2,
                            boxShadow: "0 0 8px #fc3c44",
                            zIndex: 20,
                            pointerEvents: "none"
                          }} />
                        )}
                        {showBottomIndicator && (
                          <div style={{
                            position: "absolute",
                            bottom: -3,
                            left: 0,
                            right: 0,
                            height: 3,
                            background: "#fc3c44",
                            borderRadius: 2,
                            boxShadow: "0 0 8px #fc3c44",
                            zIndex: 20,
                            pointerEvents: "none"
                          }} />
                        )}

                        <div style={{ color: "#444", marginRight: 10, fontSize: 14, cursor: "grab" }}>
                          ⠿
                        </div>

                        <div 
                          onClick={() => playTrack(idx, activePlaylist.id)}
                          style={{
                            width: 42,
                            height: 42,
                            borderRadius: 8,
                            background: "#222",
                            overflow: "hidden",
                            marginRight: 12,
                            flexShrink: 0,
                            display: "flex",
                            alignItems: "center",
                            justifyContent: "center",
                            cursor: "pointer"
                          }}
                        >
                          {track.cover ? (
                            <img src={track.cover} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                          ) : (
                            <span style={{ fontSize: 18, color: "#555" }}>🎵</span>
                          )}
                        </div>

                        <div onClick={() => playTrack(idx, activePlaylist.id)} style={{ flex: 1, minWidth: 0, cursor: "pointer" }}>
                          <div style={{ fontWeight: 600, fontSize: 13, color: isCurrent ? "#fc3c44" : "#fff", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                            {track.title || track.name}
                          </div>
                          <div style={{ fontSize: 11, color: "#666", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", marginTop: 2 }}>
                            {track.artist || "Unbekannter Künstler"}
                          </div>
                        </div>

                        <div style={{ fontSize: 11, color: "#555", marginLeft: 8, marginRight: 8 }}>
                          {formatTime(track.duration || 0)}
                        </div>

                        <button
                          onClick={() => removeTrackFromPlaylist(activePlaylist.id, track.id)}
                          title="Aus Playlist entfernen"
                          style={{ background: "none", border: "none", color: "#444", fontSize: 13, cursor: "pointer", padding: 4 }}
                        >
                          ✕
                        </button>
                      </div>
                    );
                  })
                )}
              </div>
            )}

            {/* --- VIEW: FULL PLAYER --- */}
            {view === 'player' && (
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100%", padding: "20px 0" }}>
                <div style={{
                  width: 220,
                  height: 220,
                  borderRadius: "50%",
                  background: "#121212",
                  border: "4px solid #222",
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "center",
                  marginBottom: 30,
                  boxShadow: isPlaying ? "0 0 30px rgba(252, 60, 68, 0.2)" : "none",
                  animation: isPlaying ? "spin 12s linear infinite" : "none"
                }}>
                  {currentTrack && currentTrack.cover ? (
                    <img src={currentTrack.cover} alt="" style={{ width: "100%", height: "100%", borderRadius: "50%", objectFit: "cover" }} />
                  ) : (
                    <div style={{ width: 60, height: 60, borderRadius: "50%", background: "#fc3c44" }} />
                  )}
                </div>

                <div style={{ textAlign: "center", marginBottom: 20, width: "100%", padding: "0 20px" }}>
                  <div style={{ fontWeight: 800, fontSize: 18, color: "#fff", marginBottom: 4 }}>
                    {currentTrack ? (currentTrack.title || currentTrack.name) : "Kein Titel ausgewählt"}
                  </div>
                  <div style={{ fontSize: 13, color: "#666" }}>
                    {currentTrack ? (currentTrack.artist || "Unbekannter Künstler") : "—"}
                  </div>
                </div>

                {/* Progress Bar */}
                <div style={{ width: "100%", maxWidth: 320, marginBottom: 20 }}>
                  <input
                    type="range"
                    min="0"
                    max={duration || 100}
                    value={currentTime}
                    onChange={handleSeek}
                    style={{ width: "100%" }}
                  />
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#555", marginTop: 6 }}>
                    <span>{formatTime(currentTime)}</span>
                    <span>{formatTime(duration)}</span>
                  </div>
                </div>

                {/* Main Controls */}
                <div style={{ display: "flex", alignItems: "center", gap: 24, marginBottom: 24 }}>
                  <button
                    onClick={() => setIsShuffle(!isShuffle)}
                    style={{ background: "none", border: "none", color: isShuffle ? "#fc3c44" : "#444", fontSize: 18, cursor: "pointer" }}
                  >
                    🔀
                  </button>
                  <button
                    onClick={handlePrevTrack}
                    style={{ background: "none", border: "none", color: "#fff", fontSize: 22, cursor: "pointer" }}
                  >
                    ⏮
                  </button>
                  <button
                    onClick={togglePlay}
                    style={{
                      width: 56,
                      height: 56,
                      borderRadius: "50%",
                      background: "#fc3c44",
                      border: "none",
                      color: "#fff",
                      fontSize: 22,
                      cursor: "pointer",
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "center"
                    }}
                  >
                    {isPlaying ? "⏸" : "▶"}
                  </button>
                  <button
                    onClick={handleNextTrack}
                    style={{ background: "none", border: "none", color: "#fff", fontSize: 22, cursor: "pointer" }}
                  >
                    ⏭
                  </button>
                  <button
                    onClick={() => setRepeatMode(repeatMode === 'off' ? 'all' : repeatMode === 'all' ? 'one' : 'off')}
                    style={{ background: "none", border: "none", color: repeatMode !== 'off' ? "#fc3c44" : "#444", fontSize: 18, cursor: "pointer" }}
                  >
                    🔁 {repeatMode === 'one' && <sup style={{ fontSize: 9 }}>1</sup>}
                  </button>
                </div>

                {/* Volume Slider */}
                <div style={{ display: "flex", alignItems: "center", gap: 10, width: 200 }}>
                  <span style={{ fontSize: 12, color: "#555" }}>🔈</span>
                  <input
                    type="range"
                    min="0"
                    max="1"
                    step="0.01"
                    value={volume}
                    onChange={handleVolumeChange}
                    style={{ flex: 1 }}
                  />
                  <span style={{ fontSize: 12, color: "#555" }}>🔊</span>
                </div>
              </div>
            )}

            {/* --- VIEW: EQUALIZER --- */}
            {view === 'eq' && (
              <div style={{ padding: "10px 0" }}>
                <div style={{ fontWeight: 800, fontSize: 16, marginBottom: 20 }}>5-Band Equalizer</div>
                <div className="flat-card" style={{ padding: 20 }}>
                  {eqBands.map((band, idx) => (
                    <div key={band.label} style={{ marginBottom: 18 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#888", marginBottom: 6 }}>
                        <span>{band.label}</span>
                        <span style={{ color: "#fc3c44", fontWeight: 700 }}>{band.val > 0 ? `+${band.val}` : band.val} dB</span>
                      </div>
                      <input
                        type="range"
                        min="-12"
                        max="12"
                        step="1"
                        value={band.val}
                        onChange={(e) => handleEQChange(idx, parseInt(e.target.value))}
                        style={{ width: "100%" }}
                      />
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* --- VIEW: SETTINGS & BACKUP --- */}
            {view === 'settings' && (
              <div>
                <div style={{ fontWeight: 800, fontSize: 16, marginBottom: 16 }}>Einstellungen & Sicherung</div>

                <div className="flat-card" style={{ padding: 16, marginBottom: 16 }}>
                  <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 10 }}>Daten sichern</div>
                  <button
                    onClick={exportBackup}
                    style={{ width: "100%", background: "#1a1a1a", border: "1px solid #333", color: "#fff", borderRadius: 12, padding: "12px", fontSize: 13, fontWeight: 600, cursor: "pointer", marginBottom: 10 }}
                  >
                    💾 Backup als JSON herunterladen
                  </button>

                  <label style={{
                    width: "100%",
                    background: "#1a1a1a",
                    border: "1px solid #333",
                    color: "#fff",
                    borderRadius: 12,
                    padding: "12px",
                    fontSize: 13,
                    fontWeight: 600,
                    cursor: "pointer",
                    display: "block",
                    textAlign: "center"
                  }}>
                    📂 Backup wiederherstellen
                    <input type="file" accept=".json" onChange={importBackup} style={{ display: "none" }} />
                  </label>
                </div>

                <div className="flat-card" style={{ padding: 16 }}>
                  <div style={{ fontWeight: 700, fontSize: 13, color: "#f87171", marginBottom: 10 }}>Gefahrenbereich</div>
                  {!confirmClear ? (
                    <button
                      onClick={() => setConfirmClear(true)}
                      style={{ width: "100%", background: "none", color: "#f87171", border: "1px solid #3d0f0f", borderRadius: 12, padding: "12px", fontSize: 13, fontWeight: 700, cursor: "pointer" }}
                    >
                      Bibliothek löschen
                    </button>
                  ) : (
                    <div style={{ display: "flex", gap: 8 }}>
                      <button
                        onClick={clearLibrary}
                        style={{ flex: 1, background: "#3d0f0f", color: "#f87171", border: "1px solid #5c1a1a", borderRadius: 12, padding: "12px", fontSize: 13, fontWeight: 700, cursor: "pointer" }}
                      >
                        Ja, alles löschen
                      </button>
                      <button
                        onClick={() => setConfirmClear(false)}
                        style={{ flex: 1, background: "#1a1a1a", color: "#888", border: "1px solid #333", borderRadius: 12, padding: "12px", fontSize: 13, fontWeight: 700, cursor: "pointer" }}
                      >
                        Abbrechen
                      </button>
                    </div>
                  )}
                </div>

                <div style={{ marginTop: 16, padding: "12px 14px", background: "#0d0d0d", borderRadius: 10, fontSize: 11, color: "#444", lineHeight: 1.6 }}>
                  ⚡ Alles wird automatisch im Browser-Speicher (IndexedDB) gesichert und bleibt beim Aktualisieren erhalten.
                </div>
              </div>
            )}

          </div>

          {/* Bottom Persistent Mini Player */}
          {currentTrack && view !== 'player' && (
            <div 
              onClick={() => setView('player')}
              style={{
                position: "fixed",
                bottom: 0,
                left: 0,
                right: 0,
                background: "#121212",
                borderTop: "1px solid #222",
                padding: "10px 16px",
                display: "flex",
                alignItems: "center",
                justifyContent: "space-between",
                cursor: "pointer",
                zIndex: 100
              }}
            >
              <div style={{ display: "flex", alignItems: "center", gap: 12, minWidth: 0 }}>
                <div style={{ width: 38, height: 38, borderRadius: 6, background: "#222", overflow: "hidden", flexShrink: 0 }}>
                  {currentTrack.cover ? (
                    <img src={currentTrack.cover} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                  ) : (
                    <div style={{ width: "100%", height: "100%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>🎵</div>
                  )}
                </div>
                <div style={{ minWidth: 0 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#fff", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                    {currentTrack.title || currentTrack.name}
                  </div>
                  <div style={{ fontSize: 10, color: "#666", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                    {currentTrack.artist || "Unbekannter Künstler"}
                  </div>
                </div>
              </div>

              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <button
                  onClick={(e) => { e.stopPropagation(); togglePlay(); }}
                  style={{ width: 36, height: 36, borderRadius: "50%", background: "#fc3c44", border: "none", color: "#fff", fontSize: 16, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}
                >
                  {isPlaying ? "⏸" : "▶"}
                </button>
              </div>
            </div>
          )}

          {/* Modal: Add to Playlist */}
          {showAddToPlaylistModal && trackToAddToPlaylist && (
            <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, padding: 20 }}>
              <div className="flat-card" style={{ width: "100%", maxWidth: 340, padding: 20 }}>
                <div style={{ fontWeight: 800, fontSize: 15, marginBottom: 12 }}>Zu Playlist hinzufügen</div>
                <div style={{ fontSize: 12, color: "#666", marginBottom: 16 }}>
                  "{trackToAddToPlaylist.title || trackToAddToPlaylist.name}"
                </div>

                {playlists.length === 0 ? (
                  <div style={{ fontSize: 12, color: "#555", marginBottom: 16 }}>Noch keine Playlists vorhanden.</div>
                ) : (
                  playlists.map(pl => (
                    <button
                      key={pl.id}
                      onClick={() => addTrackToPlaylist(pl.id, trackToAddToPlaylist.id)}
                      style={{ width: "100%", background: "#1a1a1a", border: "1px solid #333", color: "#fff", borderRadius: 10, padding: "10px", fontSize: 12, fontWeight: 600, cursor: "pointer", marginBottom: 8, textAlign: "left" }}
                    >
                      📂 {pl.name}
                    </button>
                  ))
                )}

                <button
                  onClick={() => setShowAddToPlaylistModal(false)}
                  style={{ width: "100%", background: "none", border: "none", color: "#888", padding: "10px", fontSize: 12, cursor: "pointer", marginTop: 8 }}
                >
                  Abbrechen
                </button>
              </div>
            </div>
          )}

          {/* Modal: Create Playlist */}
          {showCreatePlaylistModal && (
            <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, padding: 20 }}>
              <div className="flat-card" style={{ width: "100%", maxWidth: 340, padding: 20 }}>
                <div style={{ fontWeight: 800, fontSize: 15, marginBottom: 16 }}>Neue Playlist erstellen</div>
                <input
                  type="text"
                  placeholder="Playlist-Name..."
                  value={newPlaylistName}
                  onChange={(e) => setNewPlaylistName(e.target.value)}
                  style={{ width: "100%", background: "#1a1a1a", border: "1px solid #333", borderRadius: 10, padding: "10px 12px", color: "#fff", fontSize: 13, outline: "none", marginBottom: 16 }}
                />
                <div style={{ display: "flex", gap: 8 }}>
                  <button
                    onClick={createPlaylist}
                    style={{ flex: 1, background: "#fc3c44", color: "#fff", border: "none", borderRadius: 10, padding: "10px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}
                  >
                    Erstellen
                  </button>
                  <button
                    onClick={() => setShowCreatePlaylistModal(false)}
                    style={{ flex: 1, background: "#1a1a1a", color: "#888", border: "1px solid #333", borderRadius: 10, padding: "10px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}
                  >
                    Abbrechen
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<MusicPlayer />);
  </script>
</body>
</html>
