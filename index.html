<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Music</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #000; height: 100dvh; font-family: 'Inter', -apple-system, sans-serif; color: #fff; -webkit-font-smoothing: antialiased; overflow: hidden; }
    #root { height: 100%; width: 100%; }
    .flat-card { background: #121212; border: 1px solid #222; border-radius: 20px; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    .icon-btn { background: none; border: none; cursor: pointer; color: #fff; display: flex; align-items: center; justify-content: center; }
    .icon-btn:active { opacity: 0.6; }
    input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; outline: none; cursor: pointer; background: #333; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #fff; cursor: pointer; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback, useMemo } = React;

// ─── IndexedDB ────────────────────────────────────────────────────────────────
// v3: neuer Store 'playlists' für benannte Wiedergabelisten
const DB_NAME    = 'ColdEnginePlayerDB';
const DB_VERSION = 3;
const ITEM_H     = 65;
let _db = null;

const getDB = () => new Promise((resolve, reject) => {
  if (_db) return resolve(_db);
  const req = indexedDB.open(DB_NAME, DB_VERSION);
  req.onupgradeneeded = ({ target: { result: db, transaction: upgradeTx }, oldVersion }) => {
    if (!db.objectStoreNames.contains('tracks'))
      db.createObjectStore('tracks', { keyPath: 'id' });
    if (!db.objectStoreNames.contains('settings'))
      db.createObjectStore('settings', { keyPath: 'key' });
    if (!db.objectStoreNames.contains('tracksMetadata'))
      db.createObjectStore('tracksMetadata', { keyPath: 'id' });
    if (!db.objectStoreNames.contains('playlists'))
      db.createObjectStore('playlists', { keyPath: 'id' });
    if (oldVersion === 1) {
      const meta = upgradeTx.objectStore('tracksMetadata');
      const cur  = upgradeTx.objectStore('tracks').openCursor();
      cur.onsuccess = (e) => {
        const cursor = e.target.result;
        if (cursor) {
          const { id, name, art, originalFilename } = cursor.value;
          meta.put({ id, name: name || '', art: art || null, originalFilename: originalFilename || null });
          cursor.continue();
        }
      };
    }
  };
  req.onsuccess = ({ target: { result: db } }) => { _db = db; resolve(db); };
  req.onerror   = () => reject(req.error);
});

const dbPut = async (store, value) => {
  const db = await getDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).put(value);
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
};
const dbDelete = async (store, key) => {
  const db = await getDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).delete(key);
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
};
const dbGet = async (store, key) => {
  const db = await getDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => res(req.result || null); req.onerror = () => rej(req.error);
  });
};
const dbGetAll = async (store) => {
  const db = await getDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => res(req.result); req.onerror = () => rej(req.error);
  });
};
const dbClear = async (store) => {
  const db = await getDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).clear();
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
};
const loadBlob = async (trackId) => { const r = await dbGet('tracks', trackId); return r?.blob || null; };

// ─── Utilities ────────────────────────────────────────────────────────────────
const blobToBase64 = (blob) => new Promise(res => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(blob); });
const base64ToBlob = (dataURL) => {
  const [header, data] = dataURL.split(',');
  const mime = header.match(/:(.*?);/)[1], binary = atob(data), arr = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) arr[i] = binary.charCodeAt(i);
  return new Blob([arr], { type: mime });
};
const formatTime = (s) => { if (!s || isNaN(s)) return "0:00"; return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,"0")}`; };
const MusicNote = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" strokeWidth="1.5" strokeLinecap="round">
    <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
  </svg>
);
const ChevronRight = () => (
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#444" strokeWidth="2.5" strokeLinecap="round"><polyline points="9 18 15 12 9 6"/></svg>
);

// ─── Component ────────────────────────────────────────────────────────────────
function MusicPlayer() {
  // Library & Playback
  const [tracks, setTracks]           = useState([]);
  const [currentIdx, setCurrentIdx]   = useState(null);
  const [playing, setPlaying]         = useState(false);
  const [currentTime, setCurrentTime] = useState(0);
  const [duration, setDuration]       = useState(0);
  const [volume, setVolume]           = useState(0.8);
  const [repeat, setRepeat]           = useState(false);
  const [shuffle, setShuffle]         = useState(false);

  // Playlists
  const [playlists, setPlaylists]         = useState([]);
  const [activeCtxId, setActiveCtxId]     = useState(null); // null = Bibliothek
  const [browseView, setBrowseView]       = useState('home'); // 'home'|'library'|plId|'picker:'+plId
  const [newPlName, setNewPlName]         = useState('');
  const [showNewPlInput, setShowNewPlInput] = useState(false);
  const [editingPlId, setEditingPlId]     = useState(null);  // Playlist wird gerade umbenannt
  const [editingPlName, setEditingPlName] = useState('');

  // UI
  const [view, setView]               = useState("player");
  const [toast, setToast]             = useState(null);
  const [isScrubbing, setIsScrubbing] = useState(false);
  const [dbLoaded, setDbLoaded]       = useState(false);
  const [isExporting, setIsExporting] = useState(false);
  const [isImporting, setIsImporting] = useState(false);
  const [confirmClear, setConfirmClear] = useState(false);
  const [listScrollTop, setListScrollTop] = useState(0);
  const [listHeight, setListHeight]       = useState(500);

  // Einstellungen / EQ
  const [renderTrackIdx, setRenderTrackIdx] = useState("");
  const [eqBass, setEqBass]     = useState(0);
  const [eqMid, setEqMid]       = useState(0);
  const [eqTreble, setEqTreble] = useState(0);
  const [isRendering, setIsRendering] = useState(false);
  const [previewPlaying, setPreviewPlaying]     = useState(false);
  const [previewTime, setPreviewTime]           = useState(0);
  const [previewDuration, setPreviewDuration]   = useState(0);
  const [previewScrubbing, setPreviewScrubbing] = useState(false);
  const [headphoneOnly, setHeadphoneOnly]           = useState(false);
  const [headphonesDetected, setHeadphonesDetected] = useState(null);

  // Refs
  const audioRef         = useRef(null);
  const fileInputRef     = useRef(null);
  const artInputRef      = useRef(null);
  const importRef        = useRef(null);
  const previewAudioRef  = useRef(null);
  const audioCtxRef      = useRef(null);
  const bassNodeRef      = useRef(null);
  const midNodeRef       = useRef(null);
  const trebleNodeRef    = useRef(null);
  const playedHistoryRef = useRef([]);
  const listContainerRef = useRef(null);

  // ─── Derived ──────────────────────────────────────────────────────────────
  // Wiedergabeliste = Bibliothek oder aktive Playlist
  const contextTracks = useMemo(() => {
    if (!activeCtxId) return tracks;
    const pl = playlists.find(p => p.id === activeCtxId);
    return pl ? pl.trackIds.map(id => tracks.find(t => t.id === id)).filter(Boolean) : tracks;
  }, [tracks, playlists, activeCtxId]);

  const currentTrack    = currentIdx !== null ? contextTracks[currentIdx] : null;
  const previewProgress = previewDuration ? (previewTime / previewDuration) * 100 : 0;
  const progress        = duration ? (currentTime / duration) * 100 : 0;

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3500); };

  // currentIdx validieren wenn Context wechselt
  useEffect(() => {
    if (currentIdx !== null && currentIdx >= contextTracks.length) setCurrentIdx(null);
  }, [contextTracks, currentIdx]);

  // ─── Load from IndexedDB ──────────────────────────────────────────────────
  useEffect(() => {
    const load = async () => {
      try {
        const [dbMeta, dbSettings, dbPlaylists] = await Promise.all([
          dbGetAll('tracksMetadata'), dbGetAll('settings'), dbGetAll('playlists'),
        ]);
        const s = {};
        dbSettings.forEach(({ key, value }) => { s[key] = value; });
        if (s.eqBass        !== undefined) setEqBass(s.eqBass);
        if (s.eqMid         !== undefined) setEqMid(s.eqMid);
        if (s.eqTreble      !== undefined) setEqTreble(s.eqTreble);
        if (s.volume        !== undefined) { setVolume(s.volume); if (audioRef.current) audioRef.current.volume = s.volume; }
        if (s.repeat        !== undefined) setRepeat(s.repeat);
        if (s.shuffle       !== undefined) setShuffle(s.shuffle);
        if (s.headphoneOnly !== undefined) setHeadphoneOnly(s.headphoneOnly);
        if (s.activeCtxId   !== undefined) setActiveCtxId(s.activeCtxId);

        if (dbMeta.length > 0) {
          const order  = s.trackOrder || [];
          const sorted = [...order.map(id => dbMeta.find(t => t.id === id)).filter(Boolean), ...dbMeta.filter(t => !order.includes(t.id))];
          const loaded = sorted.map(t => ({ id: t.id, name: t.name, url: null, art: t.art || null, originalFilename: t.originalFilename || null }));
          setTracks(loaded);
          if (s.currentTrackId) {
            const idx = loaded.findIndex(t => t.id === s.currentTrackId);
            if (idx !== -1) setCurrentIdx(idx);
          }
        }
        if (dbPlaylists.length > 0) {
          const plOrder = s.playlistOrder || [];
          const sortedPls = [
            ...plOrder.map(id => dbPlaylists.find(p => p.id === id)).filter(Boolean),
            ...dbPlaylists.filter(p => !plOrder.includes(p.id)),
          ];
          setPlaylists(sortedPls);
        }
      } catch (err) { console.error('DB load error:', err); }
      finally { setDbLoaded(true); }
    };
    load();
  }, []);

  // ─── Auto-save settings ───────────────────────────────────────────────────
  useEffect(() => {
    if (!dbLoaded) return;
    const t = setTimeout(() => {
      const toSave = {
        eqBass, eqMid, eqTreble, volume, repeat, shuffle, headphoneOnly, activeCtxId,
        trackOrder:    tracks.map(t => t.id),
        playlistOrder: playlists.map(p => p.id),
        currentTrackId: currentIdx !== null ? (contextTracks[currentIdx]?.id ?? null) : null,
      };
      Promise.all(Object.entries(toSave).map(([key, value]) => dbPut('settings', { key, value }))).catch(console.error);
    }, 600);
    return () => clearTimeout(t);
  }, [eqBass, eqMid, eqTreble, volume, repeat, shuffle, headphoneOnly, activeCtxId, tracks, currentIdx, dbLoaded, contextTracks]);

  // ─── Virtual scroll container messen ──────────────────────────────────────
  useEffect(() => {
    if ((view !== "playlist" || (browseView !== 'library' && !playlists.some(p => p.id === browseView) && !browseView.startsWith('picker:'))) || !listContainerRef.current) return;
    setListHeight(listContainerRef.current.clientHeight || 500);
    setListScrollTop(0);
  }, [view, browseView, playlists]);

  const handleVolumeChange = (v) => { setVolume(v); if (audioRef.current) audioRef.current.volume = v; };

  // ─── Kopfhörererkennung ───────────────────────────────────────────────────
  const detectHeadphones = useCallback(async () => {
    if (!navigator.mediaDevices?.enumerateDevices) { setHeadphonesDetected(null); return null; }
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const outputs = devices.filter(d => d.kind === 'audiooutput');
      if (!outputs.some(d => d.label)) { setHeadphonesDetected(null); return null; }
      const found = outputs.some(d => /headphone|headset|airpod|earphone|earbuds|bluetooth|wireless/i.test(d.label));
      setHeadphonesDetected(found); return found;
    } catch { setHeadphonesDetected(null); return null; }
  }, []);

  useEffect(() => {
    if (!navigator.mediaDevices) return;
    detectHeadphones();
    navigator.mediaDevices.addEventListener('devicechange', detectHeadphones);
    return () => navigator.mediaDevices.removeEventListener('devicechange', detectHeadphones);
  }, [detectHeadphones]);

  useEffect(() => {
    if (!headphoneOnly || headphonesDetected !== false) return;
    if (playing && audioRef.current) { audioRef.current.pause(); setPlaying(false); showToast("Kopfhörer getrennt – Wiedergabe pausiert."); }
  }, [headphonesDetected, headphoneOnly, playing]);

  // ─── Playback ─────────────────────────────────────────────────────────────
  const isAudioFile = (file) =>
    file.type.includes("audio") || ["video/mp4","audio/mp4","audio/x-m4a"].includes(file.type) ||
    /\.(mp3|wav|ogg|m4a|mp4|flac|aac|opus)$/i.test(file.name);

  const playTrack = useCallback(async (idx, list) => {
    const tl  = list || contextTracks;
    let track = tl[idx];
    if (!track || !audioRef.current) return;
    if (!playedHistoryRef.current.includes(track.id)) playedHistoryRef.current.push(track.id);
    if (playedHistoryRef.current.length >= tl.length)  playedHistoryRef.current = [track.id];
    if (!track.url) {
      const blob = await loadBlob(track.id);
      if (!blob) { showToast("Audio nicht gefunden."); return; }
      const url = URL.createObjectURL(blob);
      setTracks(prev => prev.map(t => t.id === track.id ? { ...t, url } : t));
      track = { ...track, url };
    }
    audioRef.current.src = track.url;
    audioRef.current.load();
    audioRef.current.play().catch(() => {});
    setCurrentIdx(idx);
    setPlaying(true);
  }, [contextTracks]);

  const goNext = useCallback(() => {
    const ct = contextTracks;
    if (!ct.length) return;
    if (shuffle) {
      const currId = currentIdx !== null ? ct[currentIdx]?.id : null;
      let unplayed = ct.filter(t => !playedHistoryRef.current.includes(t.id) && t.id !== currId);
      if (unplayed.length === 0) { playedHistoryRef.current = []; unplayed = ct.filter(t => t.id !== currId); }
      if (unplayed.length === 0) { playTrack(0, ct); return; }
      const next = unplayed[Math.floor(Math.random() * unplayed.length)];
      playTrack(ct.findIndex(t => t.id === next.id) ?? 0, ct);
    } else { playTrack(((currentIdx ?? -1) + 1) % ct.length, ct); }
  }, [contextTracks, currentIdx, shuffle, playTrack]);

  const goPrev = useCallback(() => {
    const ct = contextTracks;
    if (!ct.length) return;
    if (audioRef.current && audioRef.current.currentTime > 3) { audioRef.current.currentTime = 0; return; }
    playTrack(((currentIdx ?? 1) - 1 + ct.length) % ct.length, ct);
  }, [contextTracks, currentIdx, playTrack]);

  const togglePlay = useCallback(async () => {
    if (!audioRef.current || !currentTrack) return;
    if (playing) { audioRef.current.pause(); setPlaying(false); return; }
    if (headphoneOnly && headphonesDetected === false) { showToast("Kopfhörer erforderlich."); return; }
    if (!currentTrack.url) {
      const blob = await loadBlob(currentTrack.id);
      if (!blob) { showToast("Audio nicht gefunden."); return; }
      const url = URL.createObjectURL(blob);
      setTracks(prev => prev.map(t => t.id === currentTrack.id ? { ...t, url } : t));
      audioRef.current.src = url;
      audioRef.current.load();
    }
    audioRef.current.play().catch(() => {});
    setPlaying(true);
  }, [playing, currentTrack, headphoneOnly, headphonesDetected]);

  useEffect(() => {
    const audio = audioRef.current;
    if (!audio) return;
    const onTime  = () => { if (!isScrubbing) setCurrentTime(audio.currentTime); };
    const onDur   = () => setDuration(audio.duration);
    const onEnded = () => { if (repeat) { audio.currentTime = 0; audio.play(); } else goNext(); };
    audio.addEventListener("timeupdate", onTime);
    audio.addEventListener("loadedmetadata", onDur);
    audio.addEventListener("ended", onEnded);
    return () => { audio.removeEventListener("timeupdate", onTime); audio.removeEventListener("loadedmetadata", onDur); audio.removeEventListener("ended", onEnded); };
  }, [goNext, repeat, isScrubbing]);

  useEffect(() => {
    if (!("mediaSession" in navigator) || !currentTrack) return;
    navigator.mediaSession.metadata = new MediaMetadata({ title: currentTrack.name, artist: activeCtxId ? (playlists.find(p => p.id === activeCtxId)?.name || "Music") : "Music", artwork: currentTrack.art ? [{ src: currentTrack.art, sizes: "300x300", type: "image/jpeg" }] : [] });
    navigator.mediaSession.setActionHandler("play", () => { audioRef.current?.play(); setPlaying(true); });
    navigator.mediaSession.setActionHandler("pause", () => { audioRef.current?.pause(); setPlaying(false); });
    navigator.mediaSession.setActionHandler("nexttrack", goNext);
    navigator.mediaSession.setActionHandler("previoustrack", goPrev);
  }, [currentTrack, activeCtxId, playlists, goNext, goPrev]);

  // ─── Track Management ─────────────────────────────────────────────────────
  const handleFiles = async (files) => {
    const audio = Array.from(files).filter(isAudioFile);
    if (!audio.length) { showToast("Keine Audio-Dateien erkannt!"); return; }
    const newTracks = audio.map((f, i) => ({ id: `t-${Date.now()}-${i}-${Math.random().toString(36).slice(2)}`, name: f.name.replace(/\.[^/.]+$/, "").replace("_tuned", " 🔊"), blob: f, art: null, originalFilename: f.name }));
    await Promise.all([
      ...newTracks.map(t => dbPut('tracks', { id: t.id, blob: t.blob })),
      ...newTracks.map(t => dbPut('tracksMetadata', { id: t.id, name: t.name, art: null, originalFilename: t.originalFilename })),
    ]).catch(console.error);
    setTracks(prev => [...prev, ...newTracks.map(t => ({ id: t.id, name: t.name, url: URL.createObjectURL(t.blob), art: null, originalFilename: t.originalFilename }))]);
    showToast(`${audio.length} Titel geladen`);
  };

  const handleArtFile = (e) => {
    const file = e.target.files?.[0];
    if (!file || currentIdx === null) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const art = ev.target.result, trackId = (contextTracks[currentIdx] || tracks[currentIdx])?.id;
      if (!trackId) return;
      setTracks(prev => prev.map(t => t.id === trackId ? { ...t, art } : t));
      try {
        const db = await getDB(), tx = db.transaction('tracksMetadata', 'readwrite'), store = tx.objectStore('tracksMetadata'), req = store.get(trackId);
        req.onsuccess = () => { if (req.result) store.put({ ...req.result, art }); };
      } catch (err) { console.error('Art save error:', err); }
    };
    reader.readAsDataURL(file);
    e.target.value = "";
  };

  const removeTrack = (idx, e) => {
    e.stopPropagation();
    const track = tracks[idx];
    if (track.url) URL.revokeObjectURL(track.url);
    dbDelete('tracks', track.id).catch(console.error);
    dbDelete('tracksMetadata', track.id).catch(console.error);
    // Aus allen Playlists entfernen
    const updPls = playlists.map(pl => pl.trackIds.includes(track.id) ? { ...pl, trackIds: pl.trackIds.filter(id => id !== track.id) } : pl);
    setPlaylists(updPls);
    updPls.filter((pl, i) => pl !== playlists[i]).forEach(pl => dbPut('playlists', pl).catch(console.error));
    setTracks(prev => prev.filter((_, i) => i !== idx));
    if (track.id === contextTracks[currentIdx]?.id) {
      if (audioRef.current) { audioRef.current.pause(); audioRef.current.src = ""; }
      setPlaying(false); setCurrentIdx(null); setCurrentTime(0); setDuration(0);
    } else if (currentIdx !== null) {
      const newCtx = contextTracks.filter(t => t.id !== track.id);
      if (currentIdx >= newCtx.length) setCurrentIdx(Math.max(0, newCtx.length - 1));
    }
  };

  const moveTrack = (index, dir) => {
    if (index + dir < 0 || index + dir >= tracks.length) return;
    const updated = [...tracks];
    [updated[index], updated[index + dir]] = [updated[index + dir], updated[index]];
    const currId = currentIdx !== null ? contextTracks[currentIdx]?.id : null;
    setTracks(updated);
    if (currId) {
      const newIdx = (!activeCtxId ? updated : updated.filter(t => playlists.find(p => p.id === activeCtxId)?.trackIds.includes(t.id))).findIndex(t => t.id === currId);
      if (newIdx !== -1) setCurrentIdx(newIdx);
    }
  };

  // ─── Playlist Management ──────────────────────────────────────────────────
  const createPlaylist = async () => {
    if (!newPlName.trim()) return;
    const pl = { id: `pl-${Date.now()}`, name: newPlName.trim(), trackIds: [] };
    setPlaylists(prev => [...prev, pl]);
    await dbPut('playlists', pl);
    setNewPlName(''); setShowNewPlInput(false);
    setBrowseView(pl.id);
  };

  const deletePlaylist = async (plId) => {
    setPlaylists(prev => prev.filter(p => p.id !== plId));
    await dbDelete('playlists', plId);
    if (activeCtxId === plId) setActiveCtxId(null);
    setBrowseView('home');
  };

  const addTrackToPlaylist = async (plId, trackId) => {
    let updated;
    setPlaylists(prev => prev.map(pl => {
      if (pl.id !== plId || pl.trackIds.includes(trackId)) return pl;
      updated = { ...pl, trackIds: [...pl.trackIds, trackId] };
      return updated;
    }));
    if (updated) await dbPut('playlists', updated);
  };

  const removeTrackFromPlaylist = async (plId, trackId) => {
    let updated;
    setPlaylists(prev => prev.map(pl => {
      if (pl.id !== plId) return pl;
      updated = { ...pl, trackIds: pl.trackIds.filter(id => id !== trackId) };
      return updated;
    }));
    if (updated) await dbPut('playlists', updated);
    if (activeCtxId === plId) {
      const newCtx = (updated?.trackIds || []).map(id => tracks.find(t => t.id === id)).filter(Boolean);
      if (currentIdx !== null && currentIdx >= newCtx.length) setCurrentIdx(Math.max(0, newCtx.length - 1));
    }
  };

  const moveTrackInPlaylist = async (plId, fromIdx, toIdx) => {
    let updated;
    setPlaylists(prev => prev.map(pl => {
      if (pl.id !== plId) return pl;
      const ids = [...pl.trackIds];
      [ids[fromIdx], ids[toIdx]] = [ids[toIdx], ids[fromIdx]];
      updated = { ...pl, trackIds: ids };
      return updated;
    }));
    if (updated) await dbPut('playlists', updated);
    // currentIdx anpassen wenn diese Playlist aktiv ist
    if (activeCtxId === plId && currentIdx !== null) {
      if (currentIdx === fromIdx) setCurrentIdx(toIdx);
      else if (currentIdx === toIdx) setCurrentIdx(fromIdx);
    }
  };

  // Playlist-Reihenfolge ändern (▲▼ in der Übersicht)
  const movePl = (idx, dir) => {
    if (idx + dir < 0 || idx + dir >= playlists.length) return;
    const updated = [...playlists];
    [updated[idx], updated[idx + dir]] = [updated[idx + dir], updated[idx]];
    setPlaylists(updated); // Order wird via auto-save persistiert
  };

  // Playlist umbenennen
  const startEditPl = (pl) => { setEditingPlId(pl.id); setEditingPlName(pl.name); };
  const saveEditPl  = async () => {
    if (!editingPlName.trim() || !editingPlId) { setEditingPlId(null); return; }
    let updated;
    setPlaylists(prev => prev.map(pl => {
      if (pl.id !== editingPlId) return pl;
      updated = { ...pl, name: editingPlName.trim() };
      return updated;
    }));
    if (updated) await dbPut('playlists', updated);
    setEditingPlId(null); setEditingPlName('');
  };

  // ─── Backup ───────────────────────────────────────────────────────────────
  const exportBackup = async () => {
    if (!tracks.length) return;
    setIsExporting(true); showToast("Erstelle Backup...");
    try {
      const dbMeta = await dbGetAll('tracksMetadata');
      const order  = tracks.map(t => t.id);
      const sorted = order.map(id => dbMeta.find(t => t.id === id)).filter(Boolean);
      const backup = {
        version: 3,
        exportDate: new Date().toISOString(),
        settings: { eqBass, eqMid, eqTreble, repeat, shuffle },
        tracks: sorted.map(t => ({ id: t.id, name: t.name, originalFilename: t.originalFilename || null, art: t.art || null })),
        playlists: playlists.map(pl => ({ id: pl.id, name: pl.name, trackIds: pl.trackIds })),
      };
      const jsonStr = JSON.stringify(backup, null, 2), filename = `Music_Backup_${new Date().toISOString().slice(0,10)}.json`;
      if (window.showSaveFilePicker) {
        const handle = await window.showSaveFilePicker({ suggestedName: filename, types: [{ description: 'Music Backup', accept: { 'application/json': ['.json'] } }] });
        const w = await handle.createWritable(); await w.write(jsonStr); await w.close();
      } else {
        const blob = new Blob([jsonStr], { type: 'application/json' }), url = URL.createObjectURL(blob), a = document.createElement('a');
        a.href = url; a.download = filename; a.click(); URL.revokeObjectURL(url);
      }
      showToast("Backup gespeichert!");
    } catch (err) { if (err.name !== 'AbortError') { console.error(err); showToast("Backup fehlgeschlagen."); } }
    finally { setIsExporting(false); }
  };

  const importBackup = async (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    e.target.value = "";
    const jsonFile = files.find(f => f.name.endsWith('.json') || f.type === 'application/json');
    const audioFiles = files.filter(f => isAudioFile(f));
    if (!jsonFile) { showToast("Keine Backup-Datei (.json) gefunden."); return; }
    setIsImporting(true); showToast("Importiere Backup...");
    try {
      const backup = JSON.parse(await jsonFile.text());
      if (!Array.isArray(backup.tracks)) { showToast("Ungültiges Backup-Format."); setIsImporting(false); return; }
      if (audioRef.current) { audioRef.current.pause(); audioRef.current.src = ""; }
      tracks.forEach(t => { if (t.url) URL.revokeObjectURL(t.url); });
      await dbClear('tracks'); await dbClear('tracksMetadata'); await dbClear('playlists'); await dbClear('settings');
      setPlaying(false); setCurrentIdx(null); setCurrentTime(0); setDuration(0);
      setRenderTrackIdx(""); setActiveCtxId(null); setBrowseView('home');
      const s = backup.settings || {};
      setEqBass(s.eqBass ?? 0); setEqMid(s.eqMid ?? 0); setEqTreble(s.eqTreble ?? 0);
      setRepeat(s.repeat ?? false); setShuffle(s.shuffle ?? false);
      const audioMap = new Map(audioFiles.map(f => [f.name, f]));
      const matched = [], unmatched = [];
      for (const tm of backup.tracks) {
        let blob = null;
        if (backup.version === 1 && tm.audioBase64) { blob = base64ToBlob(tm.audioBase64); }
        else { const af = tm.originalFilename ? audioMap.get(tm.originalFilename) : null; if (!af) { unmatched.push(tm.originalFilename || tm.name); continue; } blob = af; }
        matched.push({ id: tm.id, name: tm.name, blob, art: tm.art || null, originalFilename: tm.originalFilename || null });
      }
      await Promise.all([...matched.map(t => dbPut('tracks', { id: t.id, blob: t.blob })), ...matched.map(t => dbPut('tracksMetadata', { id: t.id, name: t.name, art: t.art, originalFilename: t.originalFilename }))]);
      setTracks(matched.map(t => ({ id: t.id, name: t.name, url: URL.createObjectURL(t.blob), art: t.art, originalFilename: t.originalFilename })));
      // Playlists wiederherstellen (nur Tracks die gematcht wurden)
      if (Array.isArray(backup.playlists) && backup.playlists.length > 0) {
        const matchedIds = new Set(matched.map(t => t.id));
        const restoredPls = backup.playlists.map(pl => ({ ...pl, trackIds: pl.trackIds.filter(id => matchedIds.has(id)) }));
        await Promise.all(restoredPls.map(pl => dbPut('playlists', pl)));
        setPlaylists(restoredPls);
      } else { setPlaylists([]); }
      showToast(unmatched.length > 0 ? `${matched.length} Titel geladen. Nicht gefunden: ${unmatched.join(', ')}` : `${matched.length} Titel wiederhergestellt!`);
    } catch (err) { console.error(err); showToast("Import fehlgeschlagen."); }
    finally { setIsImporting(false); }
  };

  const clearLibrary = async () => {
    if (audioRef.current) { audioRef.current.pause(); audioRef.current.src = ""; }
    tracks.forEach(t => { if (t.url) URL.revokeObjectURL(t.url); });
    await Promise.all([dbClear('tracks'), dbClear('tracksMetadata'), dbClear('playlists'), dbClear('settings')]).catch(console.error);
    setTracks([]); setPlaylists([]); setCurrentIdx(null); setPlaying(false);
    setCurrentTime(0); setDuration(0); setEqBass(0); setEqMid(0); setEqTreble(0);
    setRepeat(false); setShuffle(false); setActiveCtxId(null); setBrowseView('home');
    setRenderTrackIdx(""); playedHistoryRef.current = [];
    showToast("Bibliothek gelöscht.");

  // ─── EQ / Pre-Render ──────────────────────────────────────────────────────
  const renderAndDownloadTrack = async () => {
    const idx = parseInt(renderTrackIdx);
    if (isNaN(idx) || !tracks[idx]) { showToast("Bitte wähle zuerst einen Song aus."); return; }
    let target = tracks[idx];
    setIsRendering(true); showToast("Berechne EQ-Tuning...");
    try {
      let url = target.url;
      if (!url) { const blob = await loadBlob(target.id); if (!blob) { showToast("Audio nicht gefunden."); setIsRendering(false); return; } url = URL.createObjectURL(blob); setTracks(prev => prev.map(t => t.id === target.id ? { ...t, url } : t)); }
      const response = await fetch(url), arrayBuffer = await response.arrayBuffer();
      const AudioContext = window.AudioContext || window.webkitAudioContext, decodeCtx = new AudioContext();
      const audioBuffer = await decodeCtx.decodeAudioData(arrayBuffer); decodeCtx.close();
      const OfflineContext = window.OfflineAudioContext || window.webkitOfflineAudioContext;
      const offlineCtx = new OfflineContext(audioBuffer.numberOfChannels, audioBuffer.length, audioBuffer.sampleRate);
      const src = offlineCtx.createBufferSource(); src.buffer = audioBuffer;
      const mkF = (type, freq, gain, Q) => { const f = offlineCtx.createBiquadFilter(); f.type = type; f.frequency.setValueAtTime(freq, 0); f.gain.setValueAtTime(gain, 0); if (Q !== undefined) f.Q.setValueAtTime(Q, 0); return f; };
      const bass = mkF("lowshelf",150,eqBass), mid = mkF("peaking",1000,eqMid,1), treble = mkF("highshelf",4000,eqTreble);
      src.connect(bass); bass.connect(mid); mid.connect(treble); treble.connect(offlineCtx.destination); src.start(0);
      const rendered = await offlineCtx.startRendering(), wavBlob = bufferToWav(rendered);
      const dlUrl = URL.createObjectURL(wavBlob), a = document.createElement("a");
      a.href = dlUrl; a.download = `${target.name}_tuned.m4a`; a.click(); URL.revokeObjectURL(dlUrl);
      showToast("Tuning erfolgreich!");
    } catch (err) { console.error(err); showToast("Fehler bei der Berechnung."); }
    finally { setIsRendering(false); }
  };

  const bufferToWav = (buffer) => {
    const ch = buffer.numberOfChannels, sr = buffer.sampleRate, len = buffer.length * ch * 2 + 44;
    const ab = new ArrayBuffer(len), dv = new DataView(ab); let pos = 0;
    const ws = (s) => { for (let i=0;i<s.length;i++) dv.setUint8(pos++,s.charCodeAt(i)); };
    const wu16 = (v) => { dv.setUint16(pos,v,true); pos+=2; };
    const wu32 = (v) => { dv.setUint32(pos,v,true); pos+=4; };
    ws("RIFF"); wu32(len-8); ws("WAVE"); ws("fmt "); wu32(16); wu16(1); wu16(ch); wu32(sr); wu32(sr*2*ch); wu16(ch*2); wu16(16);
    ws("data"); wu32(len-pos-4);
    const chData = []; for (let i=0;i<ch;i++) chData.push(buffer.getChannelData(i));
    let offset=0;
    while (pos < len) { for (let i=0;i<ch;i++) { const s=Math.max(-1,Math.min(1,chData[i][offset])); dv.setInt16(pos,s<0?s*0x8000:s*0x7FFF,true); pos+=2; } offset++; }
    return new Blob([ab], { type: "audio/x-m4a" });

  // ─── Live-Preview EQ ──────────────────────────────────────────────────────
  useEffect(() => {

  const TrackThumbnail = ({ art, size = 40 }) => (

  // ─── Render ───────────────────────────────────────────────────────────────

        <input ref={fileInputRef} type="file" accept="audio/*, .m4a, .mp4, audio/mp4, audio/x-m4a" multiple style={{ display:"none" }} onChange={(e) => { handleFiles(e.target.files); e.target.value=""; }} />

                <div onClick={() => { setBrowseView('library'); setActiveCtxId(null); }}
                  style={{ display:"flex", alignItems:"center", padding:"14px 16px", gap:12, borderBottom:"1px solid #1a1a1a", cursor:"pointer" }}>
                  <div style={{ width:40, height:40, borderRadius:10, background:"#1a1a1a", border:"1px solid #2a2a2a", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#666" strokeWidth="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:14, fontWeight:700, color:"#fff" }}>Alle Titel</div>
                    <div style={{ fontSize:11, color:"#555", marginTop:2 }}>{tracks.length} Titel · Bibliothek</div>
                  </div>
                  {!activeCtxId && currentTrack && <div style={{ fontSize:10, color:"#fc3c44", fontWeight:700 }}>▶</div>}
                  <ChevronRight />
                </div>

                {/* Playlists */}
                {playlists.map((pl, plIdx) => {
                  const count = pl.trackIds.filter(id => tracks.some(t => t.id === id)).length;
                  const isActive = activeCtxId === pl.id;
                  return (
                    <div key={pl.id}
                      style={{ display:"flex", alignItems:"center", padding:"10px 12px", gap:10, borderBottom:"1px solid #1a1a1a", background:isActive?"#0d0d0d":"transparent" }}>
                      {/* Cover-Collage */}
                      <div onClick={() => setBrowseView(pl.id)} style={{ cursor:"pointer", flexShrink:0 }}>
                        <PlaylistCover pl={pl} size={44} />
                      </div>
                      {/* Info */}
                      <div onClick={() => setBrowseView(pl.id)} style={{ flex:1, minWidth:0, cursor:"pointer" }}>
                        <div style={{ fontSize:14, fontWeight:700, color:isActive?"#fc3c44":"#fff", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{pl.name}</div>
                        <div style={{ fontSize:11, color:"#555", marginTop:2 }}>{count} Titel{isActive ? " · Aktiv" : ""}</div>
                      </div>
                      {/* Sortier-Buttons + Chevron */}
                      <div style={{ display:"flex", alignItems:"center", gap:3 }} onClick={ev => ev.stopPropagation()}>
                        <button onClick={() => movePl(plIdx, -1)} disabled={plIdx===0}
                          style={{ background:"#1e1e1e", border:"none", color:plIdx===0?"#2a2a2a":"#555", width:22, height:22, borderRadius:5, cursor:"pointer", fontSize:9, display:"flex", alignItems:"center", justifyContent:"center" }}>▲</button>
                        <button onClick={() => movePl(plIdx, 1)} disabled={plIdx===playlists.length-1}
                          style={{ background:"#1e1e1e", border:"none", color:plIdx===playlists.length-1?"#2a2a2a":"#555", width:22, height:22, borderRadius:5, cursor:"pointer", fontSize:9, display:"flex", alignItems:"center", justifyContent:"center" }}>▼</button>
                      </div>
                      <div onClick={() => setBrowseView(pl.id)} style={{ cursor:"pointer" }}><ChevronRight /></div>
                    </div>
                  );
                })}

                {/* Neue Playlist */}
                <div style={{ padding:"14px 16px" }}>
                  {showNewPlInput ? (
                    <div style={{ display:"flex", gap:8 }}>
                      <input autoFocus value={newPlName} onChange={e => setNewPlName(e.target.value)}
                        onKeyDown={e => { if(e.key==='Enter') createPlaylist(); if(e.key==='Escape') { setShowNewPlInput(false); setNewPlName(''); } }}
                        placeholder="Playlist-Name"
                        style={{ flex:1, background:"#1a1a1a", border:"1px solid #333", borderRadius:10, padding:"8px 12px", color:"#fff", fontSize:13, outline:"none" }} />
                      <button onClick={createPlaylist} style={{ background:"#fc3c44", border:"none", borderRadius:10, color:"#fff", padding:"8px 14px", fontSize:13, fontWeight:600, cursor:"pointer" }}>Erstellen</button>
                      <button onClick={() => { setShowNewPlInput(false); setNewPlName(''); }} style={{ background:"#222", border:"none", borderRadius:10, color:"#666", padding:"8px 12px", fontSize:13, cursor:"pointer" }}>✕</button>
                    </div>
                  ) : (
                    <button onClick={() => setShowNewPlInput(true)}
                      style={{ width:"100%", background:"none", border:"1px dashed #2a2a2a", borderRadius:12, color:"#555", padding:"10px", fontSize:13, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
                      <span style={{ fontSize:16, lineHeight:1 }}>+</span> Neue Playlist
                    </button>
                  )}
                </div>
              </div>
            )}

            {/* BIBLIOTHEK: alle Titel (virtual scroll) */}
            {browseView === 'library' && (
              <div className="flat-card" style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
                <div style={{ display:"flex", alignItems:"center", padding:"12px 14px", borderBottom:"1px solid #1e1e1e", gap:10, flexShrink:0 }}>
                  <button onClick={() => setBrowseView('home')} className="icon-btn" style={{ color:"#666" }}>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>
                  </button>
                  <span style={{ fontSize:15, fontWeight:800 }}>Alle Titel</span>
                  <span style={{ fontSize:11, color:"#444", marginLeft:"auto" }}>{tracks.length}</span>
                </div>
                <div ref={listContainerRef} onScroll={(e) => setListScrollTop(e.currentTarget.scrollTop)} style={{ flex:1, overflowY:"auto", position:"relative" }}>
                  <div style={{ height:totalListH, position:"relative" }}>
                    {Array.from({ length: Math.max(0, vsEnd-vsStart+1) }, (_, vi) => {
                      const i = vsStart + vi;
                      if (i >= tracks.length) return null;
                      const t = tracks[i];
                      const isCurrent = !activeCtxId && contextTracks[currentIdx]?.id === t.id;
                      return (
                        <div key={t.id} onClick={() => { setActiveCtxId(null); playTrack(i, tracks); setView("player"); }}
                          style={{ position:"absolute", top:i*ITEM_H, left:0, right:0, height:ITEM_H, display:"flex", alignItems:"center", padding:"0 14px", gap:12, background:isCurrent?"#1a1a1a":"transparent", borderBottom:"1px solid #1a1a1a", cursor:"pointer", boxSizing:"border-box" }}>
                          <TrackThumbnail art={t.art} />
                          <div style={{ flex:1, minWidth:0 }}>
                            <div style={{ fontSize:14, fontWeight:isCurrent?800:500, color:isCurrent?"#fc3c44":"#fff", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{t.name}</div>
                          </div>
                          <div style={{ display:"flex", gap:4 }} onClick={ev => ev.stopPropagation()}>
                            {playlists.length > 0 && (
                              <div style={{ position:"relative" }}>
                                <button onClick={() => {
                                  // Zur ersten Playlist hinzufügen die diesen Track nicht hat, oder zur Auswahl navigieren
                                  if (playlists.length === 1) { addTrackToPlaylist(playlists[0].id, t.id); showToast(`Zu "${playlists[0].name}" hinzugefügt`); }
                                  else { setBrowseView(`addto:${t.id}`); }
                                }} style={{ background:"#1e1e1e", border:"1px solid #2a2a2a", borderRadius:6, color:"#888", fontSize:12, fontWeight:700, width:28, height:28, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>
                                  +
                                </button>
                              </div>
                            )}
                            <button onClick={() => moveTrack(i, -1)} disabled={i===0} style={{ background:"#222", border:"none", color:"#666", width:24, height:24, borderRadius:6, cursor:"pointer", fontSize:10, display:"flex", alignItems:"center", justifyContent:"center" }}>▲</button>
                            <button onClick={() => moveTrack(i, 1)} disabled={i===tracks.length-1} style={{ background:"#222", border:"none", color:"#666", width:24, height:24, borderRadius:6, cursor:"pointer", fontSize:10, display:"flex", alignItems:"center", justifyContent:"center" }}>▼</button>
                            <button onClick={ev => removeTrack(i, ev)} style={{ background:"none", border:"none", color:"#555", fontSize:18, cursor:"pointer", width:28, height:28, display:"flex", alignItems:"center", justifyContent:"center" }}>×</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}

            {/* TRACK ZU PLAYLIST HINZUFÜGEN (Auswahl bei mehreren Playlists) */}
            {browseView.startsWith('addto:') && (() => {
              const trackId = browseView.split(':')[1];
              const t = tracks.find(tr => tr.id === trackId);
              return (
                <div className="flat-card" style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
                  <div style={{ display:"flex", alignItems:"center", padding:"12px 14px", borderBottom:"1px solid #1e1e1e", gap:10, flexShrink:0 }}>
                    <button onClick={() => setBrowseView('library')} className="icon-btn" style={{ color:"#666" }}>
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>
                    </button>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:13, fontWeight:700, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>Zu Playlist hinzufügen</div>
                      <div style={{ fontSize:11, color:"#555" }}>{t?.name}</div>
                    </div>
                  </div>
                  <div style={{ flex:1, overflowY:"auto" }}>
                    {playlists.map(pl => {
                      const alreadyIn = pl.trackIds.includes(trackId);
                      return (
                        <div key={pl.id} onClick={() => { if (!alreadyIn) { addTrackToPlaylist(pl.id, trackId); showToast(`Zu "${pl.name}" hinzugefügt`); } setBrowseView('library'); }}
                          style={{ display:"flex", alignItems:"center", padding:"14px 16px", gap:12, borderBottom:"1px solid #1a1a1a", cursor:alreadyIn?"default":"pointer", opacity:alreadyIn?0.4:1 }}>
                          <div style={{ flex:1, fontSize:14, fontWeight:600, color:"#fff" }}>{pl.name}</div>
                          <div style={{ fontSize:12, color:alreadyIn?"#555":"#fc3c44", fontWeight:700 }}>{alreadyIn ? "Bereits drin" : "+ Hinzufügen"}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })()}

            {/* PLAYLIST DETAIL */}
            {playlists.some(p => p.id === browseView) && (() => {
              const pl = playlists.find(p => p.id === browseView);
              const plTracks = pl.trackIds.map(id => tracks.find(t => t.id === id)).filter(Boolean);
              const isActive = activeCtxId === pl.id;
              return (
                <div className="flat-card" style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
                  {/* Header */}
                  <div style={{ display:"flex", alignItems:"center", padding:"12px 14px", borderBottom:"1px solid #1e1e1e", gap:8, flexShrink:0 }}>
                    <button onClick={() => { setBrowseView('home'); setEditingPlId(null); }} className="icon-btn" style={{ color:"#666", flexShrink:0 }}>
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>
                    </button>

                    {/* Name: entweder Anzeige oder Eingabe */}
                    {editingPlId === pl.id ? (
                      <input autoFocus value={editingPlName}
                        onChange={e => setEditingPlName(e.target.value)}
                        onKeyDown={e => { if (e.key === 'Enter') saveEditPl(); if (e.key === 'Escape') setEditingPlId(null); }}
                        style={{ flex:1, background:"#1a1a1a", border:"1px solid #fc3c44", borderRadius:8, padding:"4px 10px", color:"#fff", fontSize:15, fontWeight:800, outline:"none" }} />
                    ) : (
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontSize:15, fontWeight:800, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{pl.name}</div>
                        <div style={{ fontSize:11, color:"#555", marginTop:1 }}>{plTracks.length} Titel{isActive ? " · Wird gespielt" : ""}</div>
                      </div>
                    )}

                    {/* Umbenennen speichern / Bleistift */}
                    {editingPlId === pl.id ? (
                      <button onClick={saveEditPl} className="icon-btn" style={{ color:"#fc3c44", flexShrink:0, fontSize:16, fontWeight:800 }}>✓</button>
                    ) : (
                      <button onClick={() => startEditPl(pl)} className="icon-btn" style={{ color:"#444", flexShrink:0 }}>
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                        </svg>
                      </button>
                    )}

                    {/* Löschen */}
                    <button onClick={() => deletePlaylist(pl.id)} className="icon-btn" style={{ color:"#3a3a3a", flexShrink:0 }}>
                      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                    </button>
                  </div>

                  {/* Play-Button */}
                  {plTracks.length > 0 && (
                    <div style={{ padding:"10px 14px", borderBottom:"1px solid #1a1a1a", flexShrink:0 }}>
                      <button onClick={() => { setActiveCtxId(pl.id); playTrack(0, plTracks); setView("player"); }}
                        style={{ width:"100%", background:isActive?"#fc3c44":"#1a1a1a", border:`1px solid ${isActive?"#fc3c44":"#2a2a2a"}`, borderRadius:10, color:isActive?"#fff":"#888", padding:"9px", fontSize:13, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                        {isActive ? "Wird gespielt" : "Wiedergabe"}
                      </button>
                    </div>
                  )}

                  {/* Track-Liste */}
                  <div ref={listContainerRef} onScroll={(e) => setListScrollTop(e.currentTarget.scrollTop)} style={{ flex:1, overflowY:"auto" }}>
                    {plTracks.length === 0 ? (
                      <div style={{ padding:32, textAlign:"center", color:"#444", fontSize:12 }}>Noch keine Titel. Tippe unten auf „+ Titel hinzufügen".</div>
                    ) : plTracks.map((t, i) => {
                      const isCur = isActive && contextTracks[currentIdx]?.id === t.id;
                      return (
                        <div key={t.id} onClick={() => { setActiveCtxId(pl.id); playTrack(i, plTracks); setView("player"); }}
                          style={{ display:"flex", alignItems:"center", padding:"10px 14px", gap:12, background:isCur?"#1a1a1a":"transparent", borderBottom:"1px solid #1a1a1a", cursor:"pointer" }}>
                          <TrackThumbnail art={t.art} />
                          <div style={{ flex:1, minWidth:0 }}>
                            <div style={{ fontSize:14, fontWeight:isCur?800:500, color:isCur?"#fc3c44":"#fff", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{t.name}</div>
                          </div>
                          <div style={{ display:"flex", gap:4 }} onClick={ev => ev.stopPropagation()}>
                            <button onClick={() => moveTrackInPlaylist(pl.id, i, i-1)} disabled={i===0} style={{ background:"#222", border:"none", color:"#666", width:24, height:24, borderRadius:6, cursor:"pointer", fontSize:10, display:"flex", alignItems:"center", justifyContent:"center" }}>▲</button>
                            <button onClick={() => moveTrackInPlaylist(pl.id, i, i+1)} disabled={i===plTracks.length-1} style={{ background:"#222", border:"none", color:"#666", width:24, height:24, borderRadius:6, cursor:"pointer", fontSize:10, display:"flex", alignItems:"center", justifyContent:"center" }}>▼</button>
                            <button onClick={() => removeTrackFromPlaylist(pl.id, t.id)} style={{ background:"none", border:"none", color:"#555", fontSize:18, cursor:"pointer", width:28, height:28, display:"flex", alignItems:"center", justifyContent:"center" }}>×</button>
                          </div>
                        </div>
                      );
                    })}
                    {/* Titel hinzufügen */}
                    <div style={{ padding:"12px 14px" }}>
                      <button onClick={() => setBrowseView(`picker:${pl.id}`)}
                        style={{ width:"100%", background:"none", border:"1px dashed #2a2a2a", borderRadius:10, color:"#555", padding:"9px", fontSize:13, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
                        <span style={{ fontSize:16 }}>+</span> Titel hinzufügen
                      </button>
                    </div>
                  </div>
                </div>
              );
            })()}

            {/* PICKER: Titel zu Playlist hinzufügen */}
            {browseView.startsWith('picker:') && (() => {
              const plId = browseView.split(':')[1];
              const pl   = playlists.find(p => p.id === plId);
              const available = tracks.filter(t => !pl?.trackIds.includes(t.id));
              return (
                <div className="flat-card" style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
                  <div style={{ display:"flex", alignItems:"center", padding:"12px 14px", borderBottom:"1px solid #1e1e1e", gap:10, flexShrink:0 }}>
                    <button onClick={() => setBrowseView(plId)} className="icon-btn" style={{ color:"#666" }}>
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>
                    </button>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:13, fontWeight:700 }}>Zu „{pl?.name}" hinzufügen</div>
                      <div style={{ fontSize:11, color:"#555", marginTop:1 }}>{available.length} verfügbar</div>
                    </div>
                  </div>
                  <div style={{ flex:1, overflowY:"auto" }}>
                    {available.length === 0 ? (
                      <div style={{ padding:32, textAlign:"center", color:"#444", fontSize:12 }}>Alle Titel sind bereits in dieser Playlist.</div>
                    ) : available.map(t => (
                      <div key={t.id} onClick={() => { addTrackToPlaylist(plId, t.id); showToast(`"${t.name}" hinzugefügt`); }}
                        style={{ display:"flex", alignItems:"center", padding:"10px 14px", gap:12, borderBottom:"1px solid #1a1a1a", cursor:"pointer" }}>
                        <TrackThumbnail art={t.art} />
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontSize:14, fontWeight:500, color:"#fff", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{t.name}</div>
                        </div>
                        <div style={{ fontSize:14, color:"#fc3c44", fontWeight:700, paddingLeft:8 }}>+</div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })()}

          </div>
        )}

        {/* ── EINSTELLUNGEN ── */}
        {view === "tuning" && (
          <div className="flat-card" style={{ flex:1, overflowY:"auto", padding:"24px" }}>

            <div style={{ marginBottom:32 }}>
              <h3 style={{ fontSize:18, fontWeight:800, marginBottom:20 }}>Allgemein</h3>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                <div>
                  <div style={{ fontSize:13, fontWeight:600, color:"#fff", marginBottom:3 }}>Nur mit Kopfhörern</div>
                  <div style={{ fontSize:11, color:"#555", lineHeight:1.5 }}>
                    {headphonesDetected===true && "🎧 Kopfhörer erkannt"}{headphonesDetected===false && "🔈 Kein Kopfhörer erkannt"}{headphonesDetected===null && "Status unbekannt"}
                  </div>
                </div>
                <button onClick={() => setHeadphoneOnly(v=>!v)}
                  style={{ width:44, height:26, borderRadius:13, background:headphoneOnly?"#fc3c44":"#2a2a2a", border:`1px solid ${headphoneOnly?"#fc3c44":"#444"}`, cursor:"pointer", position:"relative", flexShrink:0, transition:"all 0.2s" }}>
                  <div style={{ width:18, height:18, borderRadius:"50%", background:"#fff", position:"absolute", top:3, left:headphoneOnly?22:3, transition:"left 0.2s" }} />
                </button>
              </div>
              {headphoneOnly && headphonesDetected===null && (
                <div style={{ marginTop:12, fontSize:11, color:"#555", lineHeight:1.6 }}>Kopfhörererkennung benötigt Browser-Berechtigung. Auf iOS nicht verfügbar.</div>
              )}
            </div>

            <div style={{ marginBottom:32 }}>
              <h3 style={{ fontSize:18, fontWeight:800, marginBottom:8 }}>Song-Tuner</h3>
              <p style={{ fontSize:12, color:"#666", marginBottom:20 }}>Wähle einen Titel, stelle den EQ ein, höre live rein — und exportiere dann die fertige Datei.</p>
              <div style={{ marginBottom:20 }}>
                <label style={{ display:"block", fontSize:12, fontWeight:600, color:"#888", marginBottom:8 }}>Titel auswählen:</label>
                <select value={renderTrackIdx} onChange={e => setRenderTrackIdx(e.target.value)}
                  style={{ width:"100%", background:"#1a1a1a", border:"1px solid #333", borderRadius:10, padding:"10px", color:"#fff", fontSize:13, outline:"none" }}>
                  <option value="">-- Bitte wählen --</option>
                  {tracks.map((t,i) => <option key={t.id} value={i}>{t.name}</option>)}
                </select>
              </div>
              {[{label:"Bass (150Hz)",val:eqBass,set:setEqBass},{label:"Mitten (1kHz)",val:eqMid,set:setEqMid},{label:"Höhen (4kHz)",val:eqTreble,set:setEqTreble}].map((band,i) => (
                <div key={i} style={{ marginBottom:20 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:"#666", marginBottom:6 }}>
                    <span>{band.label}</span>
                    <span style={{ color:"#fc3c44", fontWeight:700 }}>{band.val>0?`+${band.val}`:band.val} dB</span>
                  </div>
                  <input type="range" min="-12" max="12" step="1" value={band.val} onChange={e => band.set(parseInt(e.target.value))}
                    style={{ width:"100%", background:`linear-gradient(to right,#fc3c44 ${((band.val+12)/24)*100}%,#222 ${((band.val+12)/24)*100}%)` }} />
                </div>
              ))}
              {renderTrackIdx !== "" && (
                <div style={{ borderTop:"1px solid #1e1e1e", paddingTop:20, marginBottom:20 }}>
                  <div style={{ fontSize:10, fontWeight:600, color:"#3a3a3a", letterSpacing:"0.1em", marginBottom:12 }}>LIVE-VORSCHAU</div>
                  <div style={{ fontSize:14, fontWeight:700, color:previewPlaying?"#fc3c44":"#ccc", marginBottom:14, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{tracks[parseInt(renderTrackIdx)]?.name}</div>
                  <div style={{ marginBottom:16 }}>
                    <input type="range" min="0" max={previewDuration||100} value={previewTime}
                      onMouseDown={() => setPreviewScrubbing(true)} onMouseUp={() => setPreviewScrubbing(false)}
                      onTouchStart={() => setPreviewScrubbing(true)} onTouchEnd={() => setPreviewScrubbing(false)}
                      onChange={(e) => { const v=parseFloat(e.target.value); setPreviewTime(v); if(previewAudioRef.current) previewAudioRef.current.currentTime=v; }}
                      style={{ width:"100%", marginBottom:6, background:`linear-gradient(to right,#fc3c44 ${previewProgress}%,#222 ${previewProgress}%)` }} />
                    <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"#555" }}>
                      <span>{formatTime(previewTime)}</span><span>-{formatTime(previewDuration-previewTime)}</span>
                    </div>
                  </div>
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:24 }}>
                    <button onClick={() => seekPreview(-10)} className="icon-btn" style={{ flexDirection:"column", gap:3, color:"#555" }}>
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.45"/></svg>
                      <span style={{ fontSize:9 }}>10s</span>
                    </button>
                    <button onClick={togglePreviewPlay}
                      style={{ width:52, height:52, borderRadius:"50%", background:previewPlaying?"#fc3c44":"#242424", border:`2px solid ${previewPlaying?"#fc3c44":"#333"}`, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", transition:"all 0.15s" }}>
                      {previewPlaying ? <svg width="17" height="17" viewBox="0 0 24 24" fill="#fff"><rect x="5" y="4" width="4" height="16" rx="1"/><rect x="15" y="4" width="4" height="16" rx="1"/></svg>
                                      : <svg width="17" height="17" viewBox="0 0 24 24" fill="#fff" style={{ marginLeft:2 }}><polygon points="6 3 20 12 6 21 6 3"/></svg>}
                    </button>
                    <button onClick={() => seekPreview(10)} className="icon-btn" style={{ flexDirection:"column", gap:3, color:"#555" }}>
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-3.45"/></svg>
                      <span style={{ fontSize:9 }}>10s</span>
                    </button>
                  </div>
                </div>
              )}
              <button onClick={renderAndDownloadTrack} disabled={isRendering||renderTrackIdx===""}
                style={{ width:"100%", background:renderTrackIdx===""?"#1a1a1a":"#222", color:renderTrackIdx===""?"#444":"#fff", border:`1px solid ${renderTrackIdx===""?"#222":"#444"}`, borderRadius:12, padding:"12px", fontSize:14, fontWeight:700, cursor:renderTrackIdx===""?"not-allowed":"pointer" }}>
                {isRendering ? "Berechne EQ..." : "↓  Tuned song exportieren  (m4a)"}
              </button>
            </div>

            <div>
              <h3 style={{ fontSize:18, fontWeight:800, marginBottom:8 }}>Bibliothek sichern</h3>
              <p style={{ fontSize:12, color:"#666", marginBottom:4 }}>Das Backup enthält Reihenfolge, Playlists, Covers und EQ — ohne Audiodaten.</p>
              <p style={{ fontSize:11, color:"#3a3a3a", marginBottom:20, lineHeight:1.6 }}>Import: JSON + Audiodateien gemeinsam auswählen. Playlists werden automatisch wiederhergestellt.</p>
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                <button onClick={exportBackup} disabled={isExporting||tracks.length===0}
                  style={{ width:"100%", background:tracks.length===0?"#1a1a1a":"#0f3d22", color:tracks.length===0?"#444":"#4ade80", border:`1px solid ${tracks.length===0?"#222":"#1a5c32"}`, borderRadius:12, padding:"12px", fontSize:14, fontWeight:700, cursor:tracks.length===0?"not-allowed":"pointer" }}>
                  {isExporting ? "Erstelle Backup..." : `↓  Backup exportieren  (${tracks.length} Titel, ${playlists.length} Playlists)`}
                </button>
                <button onClick={() => !isImporting && importRef.current?.click()} disabled={isImporting}
                  style={{ width:"100%", background:"#0f1f3d", color:isImporting?"#666":"#60a5fa", border:"1px solid #1a2f5c", borderRadius:12, padding:"12px", fontSize:14, fontWeight:700, cursor:isImporting?"not-allowed":"pointer" }}>
                  {isImporting ? "Importiere..." : "↑  Backup importieren"}
                </button>
                {!confirmClear ? (
                  <button onClick={() => setConfirmClear(true)} style={{ width:"100%", background:"none", color:"#444", border:"1px solid #222", borderRadius:12, padding:"12px", fontSize:14, fontWeight:700, cursor:"pointer" }}>
                    Bibliothek löschen
                  </button>
                ) : (
                  <div style={{ display:"flex", gap:8 }}>
                    <button onClick={clearLibrary} style={{ flex:1, background:"#3d0f0f", color:"#f87171", border:"1px solid #5c1a1a", borderRadius:12, padding:"12px", fontSize:13, fontWeight:700, cursor:"pointer" }}>Ja, alles löschen</button>
                    <button onClick={() => setConfirmClear(false)} style={{ flex:1, background:"#1a1a1a", color:"#888", border:"1px solid #333", borderRadius:12, padding:"12px", fontSize:13, fontWeight:700, cursor:"pointer" }}>Abbrechen</button>
                  </div>
                )}
              </div>
              <div style={{ marginTop:16, padding:"12px 14px", background:"#0d0d0d", borderRadius:10, fontSize:11, color:"#3a3a3a", lineHeight:1.7 }}>
                ⚡ Alles wird automatisch im Browser gespeichert. Das Backup sichert gegen Cache-Löschung und Gerätewechsel ab.
              </div>
            </div>
          </div>
        )}

        <div style={{ textAlign:"center", marginTop:16, fontSize:10, color:"#2a2a2a", fontWeight:600, letterSpacing:"0.06em", flexShrink:0 }}>MUSIC</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MusicPlayer />);
</script>
</body>
</html>
