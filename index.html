<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Music</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
    
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      -webkit-touch-callout: none;
    }

    input, textarea {
      user-select: text;
      -webkit-user-select: text;
      -moz-user-select: text;
      -ms-user-select: text;
    }

    html, body { 
      background: #000; 
      height: 100dvh; 
      font-family: 'Inter', -apple-system, sans-serif; 
      color: #fff; 
      -webkit-font-smoothing: antialiased; 
      overflow: hidden; 
    }

    #root { height: 100%; width: 100%; }

    .flat-card { background: #121212; border: 1px solid #222; border-radius: 20px; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      background: #222;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fc3c44;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const DB_NAME = "cold_engine_db";
    const DB_VERSION = 1;

    const initDB = () => {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains("tracks")) {
            db.createObjectStore("tracks", { keyPath: "id" });
          }
          if (!db.objectStoreNames.contains("playlists")) {
            db.createObjectStore("playlists", { keyPath: "id" });
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    };

    const saveTracksToDB = async (tracks) => {
      const db = await initDB();
      const tx = db.transaction("tracks", "readwrite");
      const store = tx.objectStore("tracks");
      await store.clear();
      tracks.forEach(track => store.put(track));
    };

    const getTracksFromDB = async () => {
      const db = await initDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction("tracks", "readonly");
        const store = tx.objectStore("tracks");
        const req = store.getAll();
        req.onsuccess = () => resolve(req.result || []);
        req.onerror = () => reject(req.error);
      });
    };

    const savePlaylistsToDB = async (playlists) => {
      const db = await initDB();
      const tx = db.transaction("playlists", "readwrite");
      const store = tx.objectStore("playlists");
      await store.clear();
      playlists.forEach(pl => store.put(pl));
    };

    const getPlaylistsFromDB = async () => {
      const db = await initDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction("playlists", "readonly");
        const store = tx.objectStore("playlists");
        const req = store.getAll();
        req.onsuccess = () => resolve(req.result || []);
        req.onerror = () => reject(req.error);
      });
    };

    function MusicPlayer() {
      const [tracks, setTracks] = React.useState([]);
      const [playlists, setPlaylists] = React.useState([]);
      const [activeTab, setActiveTab] = React.useState("library");
      const [selectedPlaylistId, setSelectedPlaylistId] = React.useState(null);

      const [currentTrackId, setCurrentTrackId] = React.useState(null);
      const [isPlaying, setIsPlaying] = React.useState(false);
      const [currentTime, setCurrentTime] = React.useState(0);
      const [duration, setDuration] = React.useState(0);
      const [volume, setVolume] = React.useState(1);
      const [isShuffle, setIsShuffle] = React.useState(false);
      const [repeatMode, setRepeatMode] = React.useState("none");

      const [searchTerm, setSearchTerm] = React.useState("");
      const [showPlayerModal, setShowPlayerModal] = React.useState(false);
      const [confirmClear, setConfirmClear] = React.useState(false);

      const [playlistModalOpen, setPlaylistModalOpen] = React.useState(false);
      const [newPlaylistName, setNewPlaylistName] = React.useState("");
      const [addToPlaylistTrack, setAddToPlaylistTrack] = React.useState(null);

      // Drag & Drop States
      const [draggedIndex, setDraggedIndex] = React.useState(null);
      const [dragOverInfo, setDragOverInfo] = React.useState(null);

      // EQ
      const [eqGains, setEqGains] = React.useState([0, 0, 0, 0, 0]);

      const audioRef = React.useRef(new Audio());
      const audioCtxRef = React.useRef(null);
      const filtersRef = React.useRef([]);

      React.useEffect(() => {
        (async () => {
          const loadedTracks = await getTracksFromDB();
          if (loadedTracks.length) setTracks(loadedTracks);
          const loadedPlaylists = await getPlaylistsFromDB();
          if (loadedPlaylists.length) setPlaylists(loadedPlaylists);
        })();
      }, []);

      const initAudioContext = () => {
        if (!audioCtxRef.current) {
          const AudioCtx = window.AudioContext || window.webkitAudioContext;
          audioCtxRef.current = new AudioCtx();
          const source = audioCtxRef.current.createMediaElementSource(audioRef.current);
          const freqs = [60, 230, 910, 4000, 14000];
          filtersRef.current = freqs.map((freq, i) => {
            const filter = audioCtxRef.current.createBiquadFilter();
            filter.type = i === 0 ? "lowshelf" : i === 4 ? "highshelf" : "peaking";
            filter.frequency.value = freq;
            filter.gain.value = eqGains[i];
            return filter;
          });
          source.connect(filtersRef.current[0]);
          for (let i = 0; i < filtersRef.current.length - 1; i++) {
            filtersRef.current[i].connect(filtersRef.current[i + 1]);
          }
          filtersRef.current[filtersRef.current.length - 1].connect(audioCtxRef.current.destination);
        }
        if (audioCtxRef.current.state === "suspended") {
          audioCtxRef.current.resume();
        }
      };

      React.useEffect(() => {
        const audio = audioRef.current;
        const updateTime = () => setCurrentTime(audio.currentTime);
        const updateDuration = () => setDuration(audio.duration || 0);
        const handleEnded = () => playNextTrack();

        audio.addEventListener("timeupdate", updateTime);
        audio.addEventListener("loadedmetadata", updateDuration);
        audio.addEventListener("ended", handleEnded);

        return () => {
          audio.removeEventListener("timeupdate", updateTime);
          audio.removeEventListener("loadedmetadata", updateDuration);
          audio.removeEventListener("ended", handleEnded);
        };
      }, [currentTrackId, tracks, playlists, selectedPlaylistId, isShuffle, repeatMode]);

      const getCurrentQueue = () => {
        if (selectedPlaylistId && activeTab === "playlists") {
          const pl = playlists.find(p => p.id === selectedPlaylistId);
          if (!pl) return [];
          return pl.trackIds.map(id => tracks.find(t => t.id === id)).filter(Boolean);
        }
        return tracks;
      };

      const playTrack = (track) => {
        if (!track) return;
        initAudioContext();
        setCurrentTrackId(track.id);
        audioRef.current.src = track.fileData;
        audioRef.current.play().then(() => setIsPlaying(true)).catch(console.error);
      };

      const togglePlay = () => {
        initAudioContext();
        if (!currentTrackId) {
          const queue = getCurrentQueue();
          if (queue.length) playTrack(queue[0]);
          return;
        }
        if (isPlaying) {
          audioRef.current.pause();
          setIsPlaying(false);
        } else {
          audioRef.current.play().then(() => setIsPlaying(true)).catch(console.error);
        }
      };

      const playNextTrack = () => {
        const queue = getCurrentQueue();
        if (!queue.length) return;
        if (repeatMode === "one") {
          audioRef.current.currentTime = 0;
          audioRef.current.play();
          return;
        }
        let nextIndex = 0;
        const currIndex = queue.findIndex(t => t.id === currentTrackId);
        if (isShuffle) {
          nextIndex = Math.floor(Math.random() * queue.length);
        } else {
          nextIndex = currIndex + 1;
          if (nextIndex >= queue.length) {
            if (repeatMode === "all") nextIndex = 0;
            else return;
          }
        }
        playTrack(queue[nextIndex]);
      };

      const playPrevTrack = () => {
        const queue = getCurrentQueue();
        if (!queue.length) return;
        const currIndex = queue.findIndex(t => t.id === currentTrackId);
        let prevIndex = currIndex - 1;
        if (prevIndex < 0) prevIndex = queue.length - 1;
        playTrack(queue[prevIndex]);
      };

      const handleSeek = (e) => {
        const val = parseFloat(e.target.value);
        audioRef.current.currentTime = val;
        setCurrentTime(val);
      };

      const handleVolume = (e) => {
        const val = parseFloat(e.target.value);
        setVolume(val);
        audioRef.current.volume = val;
      };

      const handleFileUpload = (e) => {
        const files = Array.from(e.target.files);
        if (!files.length) return;

        files.forEach(file => {
          const reader = new FileReader();
          reader.onload = (event) => {
            const track = {
              id: Date.now() + "_" + Math.random().toString(36).substring(2, 7),
              title: file.name.replace(/\.[^/.]+$/, ""),
              artist: "Unbekannter Künstler",
              duration: 0,
              fileData: event.target.result,
              isFavorite: false
            };
            setTracks(prev => {
              const updated = [...prev, track];
              saveTracksToDB(updated);
              return updated;
            });
          };
          reader.readAsDataURL(file);
        });
      };

      const deleteTrack = (id) => {
        setTracks(prev => {
          const updated = prev.filter(t => t.id !== id);
          saveTracksToDB(updated);
          return updated;
        });
        setPlaylists(prev => {
          const updated = prev.map(pl => ({
            ...pl,
            trackIds: pl.trackIds.filter(tId => tId !== id)
          }));
          savePlaylistsToDB(updated);
          return updated;
        });
      };

      const toggleFavorite = (id) => {
        setTracks(prev => {
          const updated = prev.map(t => t.id === id ? { ...t, isFavorite: !t.isFavorite } : t);
          saveTracksToDB(updated);
          return updated;
        });
      };

      // --- Drag & Drop Reordering (Fix für exakte Position & Roter Strich) ---
      const handleDragStart = (e, index) => {
        setDraggedIndex(index);
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', index.toString());
      };

      const handleDragOver = (e, index) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';

        const rect = e.currentTarget.getBoundingClientRect();
        const midY = rect.top + rect.height / 2;
        const position = e.clientY < midY ? 'above' : 'below';

        setDragOverInfo({ index, position });
      };

      const handleDragEnd = () => {
        setDraggedIndex(null);
        setDragOverInfo(null);
      };

      const handleDrop = (e, dropIndex, listType) => {
        e.preventDefault();
        e.stopPropagation();

        if (draggedIndex === null || !dragOverInfo) return;

        const position = dragOverInfo.position;
        let targetPos = position === 'above' ? dropIndex : dropIndex + 1;

        if (listType === 'library') {
          setTracks(prev => {
            const updated = [...prev];
            const [movedItem] = updated.splice(draggedIndex, 1);
            let insertAt = targetPos;
            if (draggedIndex < targetPos) {
              insertAt = targetPos - 1;
            }
            updated.splice(insertAt, 0, movedItem);
            saveTracksToDB(updated);
            return updated;
          });
        } else if (listType === 'playlist') {
          setPlaylists(prev => {
            const updated = prev.map(pl => {
              if (pl.id === selectedPlaylistId) {
                const tIds = [...pl.trackIds];
                const [movedId] = tIds.splice(draggedIndex, 1);
                let insertAt = targetPos;
                if (draggedIndex < targetPos) {
                  insertAt = targetPos - 1;
                }
                tIds.splice(insertAt, 0, movedId);
                return { ...pl, trackIds: tIds };
              }
              return pl;
            });
            savePlaylistsToDB(updated);
            return updated;
          });
        }

        setDraggedIndex(null);
        setDragOverInfo(null);
      };

      // Playlists
      const createPlaylist = () => {
        if (!newPlaylistName.trim()) return;
        const newPl = {
          id: "pl_" + Date.now(),
          name: newPlaylistName.trim(),
          trackIds: []
        };
        setPlaylists(prev => {
          const updated = [...prev, newPl];
          savePlaylistsToDB(updated);
          return updated;
        });
        setNewPlaylistName("");
        setPlaylistModalOpen(false);
      };

      const addTrackToPlaylist = (playlistId, trackId) => {
        setPlaylists(prev => {
          const updated = prev.map(pl => {
            if (pl.id === playlistId && !pl.trackIds.includes(trackId)) {
              return { ...pl, trackIds: [...pl.trackIds, trackId] };
            }
            return pl;
          });
          savePlaylistsToDB(updated);
          return updated;
        });
        setAddToPlaylistTrack(null);
      };

      const removeFromPlaylist = (playlistId, trackId) => {
        setPlaylists(prev => {
          const updated = prev.map(pl => {
            if (pl.id === playlistId) {
              return { ...pl, trackIds: pl.trackIds.filter(id => id !== trackId) };
            }
            return pl;
          });
          savePlaylistsToDB(updated);
          return updated;
        });
      };

      const deletePlaylist = (playlistId) => {
        setPlaylists(prev => {
          const updated = prev.filter(p => p.id !== playlistId);
          savePlaylistsToDB(updated);
          return updated;
        });
        if (selectedPlaylistId === playlistId) setSelectedPlaylistId(null);
      };

      // Backup / Clear
      const exportBackup = () => {
        const data = JSON.stringify({ tracks, playlists });
        const blob = new Blob([data], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `music_player_backup_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
      };

      const importBackup = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (data.tracks) {
              setTracks(data.tracks);
              saveTracksToDB(data.tracks);
            }
            if (data.playlists) {
              setPlaylists(data.playlists);
              savePlaylistsToDB(data.playlists);
            }
            alert("Backup erfolgreich geladen!");
          } catch (err) {
            alert("Fehler beim Importieren!");
          }
        };
        reader.readAsText(file);
      };

      const clearLibrary = async () => {
        setTracks([]);
        setPlaylists([]);
        const db = await initDB();
        const tx = db.transaction(["tracks", "playlists"], "readwrite");
        await tx.objectStore("tracks").clear();
        await tx.objectStore("playlists").clear();
        setConfirmClear(false);
      };

      const formatTime = (secs) => {
        if (!secs || isNaN(secs)) return "0:00";
        const m = Math.floor(secs / 60);
        const s = Math.floor(secs % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
      };

      const currentTrack = tracks.find(t => t.id === currentTrackId);
      const filteredTracks = tracks.filter(t => 
        t.title.toLowerCase().includes(searchTerm.toLowerCase()) || 
        t.artist.toLowerCase().includes(searchTerm.toLowerCase())
      );

      const activePlaylist = playlists.find(p => p.id === selectedPlaylistId);
      const playlistTracks = activePlaylist 
        ? activePlaylist.trackIds.map(id => tracks.find(t => t.id === id)).filter(Boolean)
        : [];

      return (
        <div style={{ display: "flex", flexDirection: "column", height: "100dvh", width: "100%", background: "#000" }}>
          
          {/* Top Bar */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 20px", borderBottom: "1px solid #1a1a1a" }}>
            <div style={{ fontWeight: 800, fontSize: 18, color: "#fff", letterSpacing: "-0.02em" }}>
              Music
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              {[
                { id: "library", label: "Bibliothek" },
                { id: "playlists", label: "Playlists" },
                { id: "eq", label: "Equalizer" },
                { id: "backup", label: "Backup / Reset" }
              ].map(tab => (
                <button
                  key={tab.id}
                  onClick={() => { setActiveTab(tab.id); if (tab.id !== "playlists") setSelectedPlaylistId(null); }}
                  style={{
                    background: activeTab === tab.id ? "#fc3c44" : "#121212",
                    color: activeTab === tab.id ? "#fff" : "#888",
                    border: "none",
                    borderRadius: 12,
                    padding: "8px 14px",
                    fontSize: 12,
                    fontWeight: 600,
                    cursor: "pointer"
                  }}
                >
                  {tab.label}
                </button>
              ))}
            </div>
          </div>

          {/* Main Content */}
          <div style={{ flex: 1, overflowY: "auto", padding: "16px", paddingBottom: "110px" }}>
            
            {/* TAB: BIBLIOTHEK */}
            {activeTab === "library" && (
              <div>
                <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
                  <input
                    type="text"
                    placeholder="Suchen..."
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                    style={{
                      flex: 1,
                      background: "#121212",
                      border: "1px solid #222",
                      borderRadius: 12,
                      padding: "10px 14px",
                      color: "#fff",
                      fontSize: 13,
                      outline: "none"
                    }}
                  />
                  <label style={{
                    background: "#fc3c44",
                    color: "#fff",
                    borderRadius: 12,
                    padding: "10px 16px",
                    fontSize: 13,
                    fontWeight: 600,
                    cursor: "pointer",
                    display: "flex",
                    alignItems: "center"
                  }}>
                    + Musik laden
                    <input type="file" multiple accept="audio/*" onChange={handleFileUpload} style={{ display: "none" }} />
                  </label>
                </div>

                {filteredTracks.length === 0 ? (
                  <div style={{ textAlign: "center", color: "#555", padding: "60px 0", fontSize: 13 }}>
                    Keine Titel vorhanden.
                  </div>
                ) : (
                  filteredTracks.map((track, idx) => {
                    const isPlayingCurrent = currentTrackId === track.id;
                    const isDragged = draggedIndex === idx;
                    const isDragOver = dragOverInfo && dragOverInfo.index === idx && draggedIndex !== idx;
                    const showTopIndicator = isDragOver && dragOverInfo.position === 'above';
                    const showBottomIndicator = isDragOver && dragOverInfo.position === 'below';

                    return (
                      <div
                        key={track.id}
                        draggable
                        onDragStart={(e) => handleDragStart(e, idx)}
                        onDragOver={(e) => handleDragOver(e, idx)}
                        onDrop={(e) => handleDrop(e, idx, 'library')}
                        onDragEnd={handleDragEnd}
                        className="flat-card"
                        style={{
                          display: "flex",
                          alignItems: "center",
                          padding: "10px 12px",
                          marginBottom: 8,
                          position: "relative",
                          opacity: isDragged ? 0.35 : 1,
                          background: isPlayingCurrent ? "rgba(252, 60, 68, 0.08)" : "#121212",
                          borderColor: isPlayingCurrent ? "#fc3c44" : "#222"
                        }}
                      >
                        {/* Red Drop Indicator Line */}
                        {showTopIndicator && (
                          <div style={{
                            position: "absolute",
                            top: -3,
                            left: 0,
                            right: 0,
                            height: 3,
                            background: "#fc3c44",
                            borderRadius: 2,
                            boxShadow: "0 0 8px #fc3c44",
                            zIndex: 20,
                            pointerEvents: "none"
                          }} />
                        )}
                        {showBottomIndicator && (
                          <div style={{
                            position: "absolute",
                            bottom: -3,
                            left: 0,
                            right: 0,
                            height: 3,
                            background: "#fc3c44",
                            borderRadius: 2,
                            boxShadow: "0 0 8px #fc3c44",
                            zIndex: 20,
                            pointerEvents: "none"
                          }} />
                        )}

                        {/* Drag Handle Icon */}
                        <div style={{ color: "#444", marginRight: 10, fontSize: 14, cursor: "grab" }} title="Ziehen zum Sortieren">
                          ⠿
                        </div>

                        <div 
                          onClick={() => playTrack(track)}
                          style={{
                            width: 40,
                            height: 40,
                            borderRadius: 8,
                            background: "#222",
                            display: "flex",
                            alignItems: "center",
                            justifyContent: "center",
                            marginRight: 12,
                            cursor: "pointer",
                            fontSize: 16
                          }}
                        >
                          🎵
                        </div>

                        <div onClick={() => playTrack(track)} style={{ flex: 1, minWidth: 0, cursor: "pointer" }}>
                          <div style={{ fontWeight: 600, fontSize: 13, color: isPlayingCurrent ? "#fc3c44" : "#fff", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                            {track.title}
                          </div>
                          <div style={{ fontSize: 11, color: "#666", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", marginTop: 2 }}>
                            {track.artist}
                          </div>
                        </div>

                        <div style={{ display: "flex", gap: 6, alignItems: "center", marginLeft: 8 }}>
                          <button
                            onClick={() => setAddToPlaylistTrack(track)}
                            title="Zu Playlist hinzufügen"
                            style={{ background: "none", border: "none", color: "#888", fontSize: 14, cursor: "pointer", padding: 4 }}
                          >
                            ➕
                          </button>
                          <button
                            onClick={() => toggleFavorite(track.id)}
                            style={{ background: "none", border: "none", color: track.isFavorite ? "#fc3c44" : "#444", fontSize: 14, cursor: "pointer", padding: 4 }}
                          >
                            ♥
                          </button>
                          <button
                            onClick={() => deleteTrack(track.id)}
                            style={{ background: "none", border: "none", color: "#444", fontSize: 13, cursor: "pointer", padding: 4 }}
                          >
                            ✕
                          </button>
                        </div>
                      </div>
                    );
                  })
                )}
              </div>
            )}

            {/* TAB: PLAYLISTS */}
            {activeTab === "playlists" && (
              <div>
                {!selectedPlaylistId ? (
                  <div>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                      <div style={{ fontSize: 14, fontWeight: 700, color: "#888" }}>Playlists ({playlists.length})</div>
                      <button
                        onClick={() => setPlaylistModalOpen(true)}
                        style={{ background: "#fc3c44", color: "#fff", border: "none", borderRadius: 12, padding: "8px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}
                      >
                        + Neue Playlist
                      </button>
                    </div>

                    {playlists.length === 0 ? (
                      <div style={{ textAlign: "center", color: "#555", padding: "60px 0", fontSize: 13 }}>
                        Keine Playlists vorhanden.
                      </div>
                    ) : (
                      playlists.map(pl => (
                        <div
                          key={pl.id}
                          onClick={() => setSelectedPlaylistId(pl.id)}
                          className="flat-card"
                          style={{ display: "flex", alignItems: "center", padding: "14px", marginBottom: 10, cursor: "pointer" }}
                        >
                          <div style={{ width: 44, height: 44, borderRadius: 10, background: "#222", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, marginRight: 14 }}>
                            📂
                          </div>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontWeight: 700, fontSize: 14, color: "#fff" }}>{pl.name}</div>
                            <div style={{ fontSize: 11, color: "#666", marginTop: 2 }}>{pl.trackIds.length} Titel</div>
                          </div>
                          <button
                            onClick={(e) => { e.stopPropagation(); deletePlaylist(pl.id); }}
                            style={{ background: "none", border: "none", color: "#444", fontSize: 13, cursor: "pointer", padding: 6 }}
                          >
                            ✕
                          </button>
                        </div>
                      ))
                    )}
                  </div>
                ) : (
                  <div>
                    <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
                      <button
                        onClick={() => setSelectedPlaylistId(null)}
                        style={{ background: "#121212", border: "1px solid #222", color: "#fff", borderRadius: 10, padding: "6px 12px", fontSize: 12, cursor: "pointer" }}
                      >
                        ← Zurück
                      </button>
                      <div style={{ fontWeight: 800, fontSize: 16, color: "#fff" }}>{activePlaylist?.name}</div>
                    </div>

                    {playlistTracks.length === 0 ? (
                      <div style={{ textAlign: "center", color: "#555", padding: "60px 0", fontSize: 13 }}>
                        Diese Playlist ist leer. Füge Titel aus der Bibliothek hinzu!
                      </div>
                    ) : (
                      playlistTracks.map((track, idx) => {
                        const isPlayingCurrent = currentTrackId === track.id;
                        const isDragged = draggedIndex === idx;
                        const isDragOver = dragOverInfo && dragOverInfo.index === idx && draggedIndex !== idx;
                        const showTopIndicator = isDragOver && dragOverInfo.position === 'above';
                        const showBottomIndicator = isDragOver && dragOverInfo.position === 'below';

                        return (
                          <div
                            key={track.id}
                            draggable
                            onDragStart={(e) => handleDragStart(e, idx)}
                            onDragOver={(e) => handleDragOver(e, idx)}
                            onDrop={(e) => handleDrop(e, idx, 'playlist')}
                            onDragEnd={handleDragEnd}
                            className="flat-card"
                            style={{
                              display: "flex",
                              alignItems: "center",
                              padding: "10px 12px",
                              marginBottom: 8,
                              position: "relative",
                              opacity: isDragged ? 0.35 : 1,
                              background: isPlayingCurrent ? "rgba(252, 60, 68, 0.08)" : "#121212",
                              borderColor: isPlayingCurrent ? "#fc3c44" : "#222"
                            }}
                          >
                            {showTopIndicator && (
                              <div style={{
                                position: "absolute",
                                top: -3,
                                left: 0,
                                right: 0,
                                height: 3,
                                background: "#fc3c44",
                                borderRadius: 2,
                                boxShadow: "0 0 8px #fc3c44",
                                zIndex: 20,
                                pointerEvents: "none"
                              }} />
                            )}
                            {showBottomIndicator && (
                              <div style={{
                                position: "absolute",
                                bottom: -3,
                                left: 0,
                                right: 0,
                                height: 3,
                                background: "#fc3c44",
                                borderRadius: 2,
                                boxShadow: "0 0 8px #fc3c44",
                                zIndex: 20,
                                pointerEvents: "none"
                              }} />
                            )}

                            <div style={{ color: "#444", marginRight: 10, fontSize: 14, cursor: "grab" }} title="Ziehen zum Sortieren">
                              ⠿
                            </div>

                            <div 
                              onClick={() => playTrack(track)}
                              style={{
                                width: 40,
                                height: 40,
                                borderRadius: 8,
                                background: "#222",
                                display: "flex",
                                alignItems: "center",
                                justifyContent: "center",
                                marginRight: 12,
                                cursor: "pointer",
                                fontSize: 16
                              }}
                            >
                              🎵
                            </div>

                            <div onClick={() => playTrack(track)} style={{ flex: 1, minWidth: 0, cursor: "pointer" }}>
                              <div style={{ fontWeight: 600, fontSize: 13, color: isPlayingCurrent ? "#fc3c44" : "#fff", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                                {track.title}
                              </div>
                              <div style={{ fontSize: 11, color: "#666", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", marginTop: 2 }}>
                                {track.artist}
                              </div>
                            </div>

                            <button
                              onClick={() => removeFromPlaylist(selectedPlaylistId, track.id)}
                              style={{ background: "none", border: "none", color: "#444", fontSize: 13, cursor: "pointer", padding: 4 }}
                            >
                              ✕
                            </button>
                          </div>
                        );
                      })
                    )}
                  </div>
                )}
              </div>
            )}

            {/* TAB: EQUALIZER */}
            {activeTab === "eq" && (
              <div>
                <div style={{ fontWeight: 800, fontSize: 16, marginBottom: 16 }}>5-Band Equalizer</div>
                <div className="flat-card" style={{ padding: 20 }}>
                  {["60Hz", "230Hz", "910Hz", "4kHz", "14kHz"].map((freq, idx) => (
                    <div key={freq} style={{ marginBottom: 18 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#888", marginBottom: 6 }}>
                        <span>{freq}</span>
                        <span style={{ color: "#fc3c44", fontWeight: 700 }}>{eqGains[idx] > 0 ? `+${eqGains[idx]}` : eqGains[idx]} dB</span>
                      </div>
                      <input
                        type="range"
                        min="-12"
                        max="12"
                        step="1"
                        value={eqGains[idx]}
                        onChange={(e) => {
                          const val = parseInt(e.target.value);
                          const updated = [...eqGains];
                          updated[idx] = val;
                          setEqGains(updated);
                          if (filtersRef.current[idx]) {
                            filtersRef.current[idx].gain.value = val;
                          }
                        }}
                        style={{ width: "100%" }}
                      />
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* TAB: BACKUP / RESET */}
            {activeTab === "backup" && (
              <div>
                <div style={{ fontWeight: 800, fontSize: 16, marginBottom: 16 }}>Sicherung & Optionen</div>

                <div className="flat-card" style={{ padding: 16, marginBottom: 16 }}>
                  <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 10 }}>Daten sichern</div>
                  <button
                    onClick={exportBackup}
                    style={{ width: "100%", background: "#1a1a1a", border: "1px solid #333", color: "#fff", borderRadius: 12, padding: "12px", fontSize: 13, fontWeight: 600, cursor: "pointer", marginBottom: 10 }}
                  >
                    💾 Backup als JSON herunterladen
                  </button>

                  <label style={{
                    width: "100%",
                    background: "#1a1a1a",
                    border: "1px solid #333",
                    color: "#fff",
                    borderRadius: 12,
                    padding: "12px",
                    fontSize: 13,
                    fontWeight: 600,
                    cursor: "pointer",
                    display: "block",
                    textAlign: "center"
                  }}>
                    📂 Backup wiederherstellen
                    <input type="file" accept=".json" onChange={importBackup} style={{ display: "none" }} />
                  </label>
                </div>

                <div className="flat-card" style={{ padding: 16 }}>
                  <div style={{ fontWeight: 700, fontSize: 13, color: "#f87171", marginBottom: 10 }}>Gefahrenbereich</div>
                  {!confirmClear ? (
                    <button
                      onClick={() => setConfirmClear(true)}
                      style={{ width: "100%", background: "none", color: "#444", border: "1px solid #222", borderRadius: 12, padding: "12px", fontSize: 14, fontWeight: 700, cursor: "pointer" }}
                    >
                      Bibliothek löschen
                    </button>
                  ) : (
                    <div style={{ display: "flex", gap: 8 }}>
                      <button onClick={clearLibrary} style={{ flex: 1, background: "#3d0f0f", color: "#f87171", border: "1px solid #5c1a1a", borderRadius: 12, padding: "12px", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>Ja, alles löschen</button>
                      <button onClick={() => setConfirmClear(false)} style={{ flex: 1, background: "#1a1a1a", color: "#888", border: "1px solid #333", borderRadius: 12, padding: "12px", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>Abbrechen</button>
                    </div>
                  )}
                </div>

                <div style={{ marginTop: 16, padding: "12px 14px", background: "#0d0d0d", borderRadius: 10, fontSize: 11, color: "#3a3a3a", lineHeight: 1.7 }}>
                  ⚡ Alles wird automatisch im Browser gespeichert. Das Backup sichert gegen Cache-Löschung und Gerätewechsel ab.
                </div>
              </div>
            )}

          </div>

          {/* Bottom Persistent Mini Player Bar */}
          {currentTrack && (
            <div 
              onClick={() => setShowPlayerModal(true)}
              style={{
                position: "fixed",
                bottom: 0,
                left: 0,
                right: 0,
                background: "#121212",
                borderTop: "1px solid #222",
                padding: "10px 16px",
                display: "flex",
                alignItems: "center",
                justifyContent: "space-between",
                cursor: "pointer",
                zIndex: 100
              }}
            >
              <div style={{ display: "flex", alignItems: "center", gap: 12, minWidth: 0 }}>
                <div style={{ width: 38, height: 38, borderRadius: 8, background: "#222", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, flexShrink: 0 }}>
                  🎵
                </div>
                <div style={{ minWidth: 0 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#fff", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                    {currentTrack.title}
                  </div>
                  <div style={{ fontSize: 10, color: "#666", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                    {currentTrack.artist}
                  </div>
                </div>
              </div>

              <button
                onClick={(e) => { e.stopPropagation(); togglePlay(); }}
                style={{ width: 36, height: 36, borderRadius: "50%", background: "#fc3c44", border: "none", color: "#fff", fontSize: 15, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}
              >
                {isPlaying ? "⏸" : "▶"}
              </button>
            </div>
          )}

          {/* Player Modal Overlay */}
          {showPlayerModal && currentTrack && (
            <div style={{ position: "fixed", inset: 0, background: "#000", zIndex: 1000, display: "flex", flexDirection: "column", padding: "20px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 30 }}>
                <button onClick={() => setShowPlayerModal(false)} style={{ background: "none", border: "none", color: "#fff", fontSize: 20, cursor: "pointer" }}>✕</button>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#888" }}>JETZT SPIELT</div>
                <div style={{ width: 20 }} />
              </div>

              <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                <div style={{ width: 220, height: 220, borderRadius: "50%", background: "#121212", border: "4px solid #222", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 60, marginBottom: 30 }}>
                  🎵
                </div>

                <div style={{ textAlign: "center", marginBottom: 20, width: "100%" }}>
                  <div style={{ fontWeight: 800, fontSize: 18, color: "#fff", marginBottom: 4 }}>{currentTrack.title}</div>
                  <div style={{ fontSize: 13, color: "#666" }}>{currentTrack.artist}</div>
                </div>

                <div style={{ width: "100%", maxWidth: 320, marginBottom: 20 }}>
                  <input
                    type="range"
                    min="0"
                    max={duration || 100}
                    value={currentTime}
                    onChange={handleSeek}
                    style={{ width: "100%" }}
                  />
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#555", marginTop: 6 }}>
                    <span>{formatTime(currentTime)}</span>
                    <span>{formatTime(duration)}</span>
                  </div>
                </div>

                <div style={{ display: "flex", alignItems: "center", gap: 24, marginBottom: 24 }}>
                  <button onClick={() => setIsShuffle(!isShuffle)} style={{ background: "none", border: "none", color: isShuffle ? "#fc3c44" : "#444", fontSize: 18, cursor: "pointer" }}>🔀</button>
                  <button onClick={playPrevTrack} style={{ background: "none", border: "none", color: "#fff", fontSize: 22, cursor: "pointer" }}>⏮</button>
                  <button onClick={togglePlay} style={{ width: 56, height: 56, borderRadius: "50%", background: "#fc3c44", border: "none", color: "#fff", fontSize: 22, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
                    {isPlaying ? "⏸" : "▶"}
                  </button>
                  <button onClick={playNextTrack} style={{ background: "none", border: "none", color: "#fff", fontSize: 22, cursor: "pointer" }}>⏭</button>
                  <button onClick={() => setRepeatMode(repeatMode === "none" ? "all" : repeatMode === "all" ? "one" : "none")} style={{ background: "none", border: "none", color: repeatMode !== "none" ? "#fc3c44" : "#444", fontSize: 18, cursor: "pointer" }}>
                    🔁 {repeatMode === "one" && <sup style={{ fontSize: 9 }}>1</sup>}
                  </button>
                </div>

                <div style={{ display: "flex", alignItems: "center", gap: 10, width: 200 }}>
                  <span style={{ fontSize: 12, color: "#555" }}>🔈</span>
                  <input type="range" min="0" max="1" step="0.01" value={volume} onChange={handleVolume} style={{ flex: 1 }} />
                  <span style={{ fontSize: 12, color: "#555" }}>🔊</span>
                </div>
              </div>
            </div>
          )}

          {/* Modal: Add To Playlist */}
          {addToPlaylistTrack && (
            <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, padding: 20 }}>
              <div className="flat-card" style={{ width: "100%", maxWidth: 320, padding: 20 }}>
                <div style={{ fontWeight: 800, fontSize: 15, marginBottom: 12 }}>Zu Playlist hinzufügen</div>
                <div style={{ fontSize: 12, color: "#666", marginBottom: 16 }}>"{addToPlaylistTrack.title}"</div>

                {playlists.length === 0 ? (
                  <div style={{ fontSize: 12, color: "#555", marginBottom: 16 }}>Keine Playlists vorhanden.</div>
                ) : (
                  playlists.map(pl => (
                    <button
                      key={pl.id}
                      onClick={() => addTrackToPlaylist(pl.id, addToPlaylistTrack.id)}
                      style={{ width: "100%", background: "#1a1a1a", border: "1px solid #333", color: "#fff", borderRadius: 10, padding: "10px", fontSize: 12, fontWeight: 600, cursor: "pointer", marginBottom: 8, textAlign: "left" }}
                    >
                      📂 {pl.name}
                    </button>
                  ))
                )}

                <button
                  onClick={() => setAddToPlaylistTrack(null)}
                  style={{ width: "100%", background: "none", border: "none", color: "#888", padding: "10px", fontSize: 12, cursor: "pointer", marginTop: 8 }}
                >
                  Abbrechen
                </button>
              </div>
            </div>
          )}

          {/* Modal: Create Playlist */}
          {playlistModalOpen && (
            <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, padding: 20 }}>
              <div className="flat-card" style={{ width: "100%", maxWidth: 320, padding: 20 }}>
                <div style={{ fontWeight: 800, fontSize: 15, marginBottom: 16 }}>Neue Playlist erstellen</div>
                <input
                  type="text"
                  placeholder="Playlist-Name..."
                  value={newPlaylistName}
                  onChange={(e) => setNewPlaylistName(e.target.value)}
                  style={{ width: "100%", background: "#1a1a1a", border: "1px solid #333", borderRadius: 10, padding: "10px 12px", color: "#fff", fontSize: 13, outline: "none", marginBottom: 16 }}
                />
                <div style={{ display: "flex", gap: 8 }}>
                  <button
                    onClick={createPlaylist}
                    style={{ flex: 1, background: "#fc3c44", color: "#fff", border: "none", borderRadius: 10, padding: "10px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}
                  >
                    Erstellen
                  </button>
                  <button
                    onClick={() => setPlaylistModalOpen(false)}
                    style={{ flex: 1, background: "#1a1a1a", color: "#888", border: "1px solid #333", borderRadius: 10, padding: "10px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}
                  >
                    Abbrechen
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<MusicPlayer />);
  </script>
</body>
</html>
