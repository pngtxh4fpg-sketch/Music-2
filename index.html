<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  
  <!-- PWA & Apple iOS Spezifikationen -->
  <title>Music</title>
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Music" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #000; height: 100dvh; font-family: 'Inter', -apple-system, sans-serif; color: #fff; -webkit-font-smoothing: antialiased; overflow: hidden; }
    #root { height: 100%; width: 100%; }
    .flat-card { background: #121212; border: 1px solid #222; border-radius: 20px; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    .icon-btn { background: none; border: none; cursor: pointer; color: #fff; display: flex; align-items: center; justify-content: center; }
    .icon-btn:active { opacity: 0.6; }
    input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; outline: none; cursor: pointer; background: #333; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #fff; cursor: pointer; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- ACHTUNG: Hier musst du deinen bestehenden React-Code / deine Logik wieder einfügen! -->
  <script type="text/babel">
    // DEIN BESTEHENDER REACT-CODE KOMMT HIER HIN
    // Ersetze diesen Block mit dem, was du aktuell an React-Code hast.
    
    /* 
    function App() {
      ...
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    */
  </script>

  <!-- Service Worker Registrierung (ganz am Ende vom body) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then((registration) => {
            console.log('Service Worker erfolgreich registriert:', registration.scope);
          })
          .catch((error) => {
            console.log('Service Worker Registrierung fehlgeschlagen:', error);
          });
      });
    }
  </script>
</body>
</html>
