<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Music</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #000; height: 100dvh; font-family: 'Inter', -apple-system, sans-serif; color: #fff; -webkit-font-smoothing: antialiased; overflow: hidden; }
    #root { height: 100%; width: 100%; }
    .flat-card { background: #121212; border: 1px solid #222; border-radius: 20px; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    .icon-btn { background: none; border: none; cursor: pointer; color: #fff; display: flex; align-items: center; justify-content: center; }
    .icon-btn:active { opacity: 0.6; }
    input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; outline: none; cursor: pointer; background: #333; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #fff; cursor: pointer; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback, useMemo } = React;

// ─── IndexedDB ────────────────────────────────────────────────────────────────
const DB_NAME    = 'ColdEnginePlayerDB';
const DB_VERSION = 3;
const ITEM_H     = 65;
let _db = null;

const getDB = () => new Promise((resolve, reject) => {
  if (_db) return resolve(_db);
  const req = indexedDB.open(DB_NAME, DB_VERSION);
  req.onupgradeneeded = ({ target: { result: db, transaction: upgradeTx }, oldVersion }) => {
    if (!db.objectStoreNames.contains('tracks'))        db.createObjectStore('tracks', { keyPath: 'id' });
    if (!db.objectStoreNames.contains('settings'))      db.createObjectStore('settings', { keyPath: 'key' });
    if (!db.objectStoreNames.contains('tracksMetadata')) db.createObjectStore('tracksMetadata', { keyPath: 'id' });
    if (!db.objectStoreNames.contains('playlists'))     db.createObjectStore('playlists', { keyPath: 'id' });
    if (oldVersion === 1) {
      const meta = upgradeTx.objectStore('tracksMetadata');
      const cur  = upgradeTx.objectStore('tracks').openCursor();
      cur.onsuccess = (e) => {
        const cursor = e.target.result;
        if (cursor) {
          const { id, name, art, originalFilename } = cursor.value;
          meta.put({ id, name: name || '', art: art || null, originalFilename: originalFilename || null });
          cursor.continue();
        }
      };
    }
  };
  req.onsuccess = ({ target: { result: db } }) => { _db = db; resolve(db); };
  req.onerror   = () => reject(req.error);
});

const dbPut = async (store, value) => {
  const db = await getDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).put(value);
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
};
const dbDelete = async (store, key) => {
  const db = await getDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).delete(key);
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
};
const dbGet = async (store, key) => {
  const db = await getDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => res(req.result || null); req.onerror = () => rej(req.error);
  });
};
const dbGetAll = async (store) => {
  const db = await getDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => res(req.result); req.onerror = () => rej(req.error);
  });
};
const dbClear = async (store) => {
  const db = await getDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).clear();
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
};
const loadBlob = async (trackId) => { const r = await dbGet('tracks', trackId); return r?.blob || null; };

// ─── Utilities ────────────────────────────────────────────────────────────────
const blobToBase64 = (blob) => new Promise(res => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(blob); });
const base64ToBlob = (dataURL) => {
  const [header, data] = dataURL.split(',');
  const mime = header.match(/:(.*?);/)[1], binary = atob(data), arr = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) arr[i] = binary.charCodeAt(i);
  return new Blob([arr], { type: mime });
};
const formatTime = (s) => { if (!s || isNaN(s)) return "0:00"; return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,"0")}`; };

// iOS maps '/' to ':' internally in filenames — reverse that in all parsed parts.
const parseFilename = (filename) => {
  const base    = filename.replace(/\.[^/.]+$/, '');
  const isTuned = base.endsWith('_tuned');
  const clean   = isTuned ? base.slice(0, -6) : base;
  const parts   = clean.split('_');
  const fix     = s => s ? s.replace(/:/g, '/') : s;
  const name    = fix(parts[0] || clean) + (isTuned ? ' 🔊' : '');
  const artist  = fix(parts[1]) || null;
  const album   = fix(parts[2]) || null;
  return { name, artist, album };
};

const MusicNote = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" strokeWidth="1.5" strokeLinecap="round">
    <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
  </svg>
);
const ChevronRight = () => (
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#444" strokeWidth="2.5" strokeLinecap="round"><polyline points="9 18 15 12 9 6"/></svg>
);
const BackArrow = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>
);
const GripIcon = () => (
  <svg width="12" height="16" viewBox="0 0 12 16" style={{touchAction:'none',userSelect:'none',cursor:'grab'}}>
    <circle cx="4" cy="3.5"  r="1.4" fill="#3a3a3a"/> <circle cx="8" cy="3.5"  r="1.4" fill="#3a3a3a"/>
    <circle cx="4" cy="8"    r="1.4" fill="#3a3a3a"/> <circle cx="8" cy="8"    r="1.4" fill="#3a3a3a"/>
    <circle cx="4" cy="12.5" r="1.4" fill="#3a3a3a"/> <circle cx="8" cy="12.5" r="1.4" fill="#3a3a3a"/>
  </svg>
);

// ─── Component ────────────────────────────────────────────────────────────────
function MusicPlayer() {
  // Library & Playback
  const [tracks, setTracks]           = useState([]);
  const [currentIdx, setCurrentIdx]   = useState(null);
  const [playing, setPlaying]         = useState(false);
  const [currentTime, setCurrentTime] = useState(0);
  const [duration, setDuration]       = useState(0);
  const [volume, setVolume]           = useState(0.8);
  const [repeat, setRepeat]           = useState(false);
  const [shuffle, setShuffle]         = useState(false);

  // Playlists
  const [playlists, setPlaylists]           = useState([]);
  const [activeCtxId, setActiveCtxId]       = useState(null); // null | plId | 'artist:NAME' | 'album:NAME||ALBUM'
  const [browseView, setBrowseView]         = useState('home');
  const [newPlName, setNewPlName]           = useState('');
  const [showNewPlInput, setShowNewPlInput] = useState(false);

  // Sub-tabs in Titelliste
  const [listTab, setListTab]         = useState('songs'); // 'songs'|'artists'|'playlists'
  const [artistCovers, setArtistCovers] = useState({});   // { artistName: base64 }
  const [albumCovers, setAlbumCovers]   = useState({});   // { 'ARTIST||ALBUM': base64 }

  // Drag-and-Drop
  const [isDragging, setIsDragging] = useState(false);
  const [dContext,   setDContext]   = useState(null);
  const [dActiveIdx, setDActiveIdx] = useState(null);
  const [dDropIdx,   setDDropIdx]   = useState(null);

  // UI
  const [view, setView]               = useState("player");
  const [toast, setToast]             = useState(null);
  const [isScrubbing, setIsScrubbing] = useState(false);
  const [dbLoaded, setDbLoaded]       = useState(false);
  const [isExporting, setIsExporting] = useState(false);
  const [isImporting, setIsImporting] = useState(false);
  const [confirmClear, setConfirmClear] = useState(false);
  const [listScrollTop, setListScrollTop] = useState(0);
  const [listHeight, setListHeight]       = useState(500);

  // EQ / Tuner
  const [renderTrackIdx, setRenderTrackIdx] = useState("");
  const [eqBass, setEqBass]     = useState(0);
  const [eqMid, setEqMid]       = useState(0);
  const [eqTreble, setEqTreble] = useState(0);
  const [isRendering, setIsRendering] = useState(false);
  const [previewPlaying, setPreviewPlaying]   = useState(false);
  const [previewTime, setPreviewTime]         = useState(0);
  const [previewDuration, setPreviewDuration] = useState(0);
  const [previewScrubbing, setPreviewScrubbing] = useState(false);
  const [headphoneOnly, setHeadphoneOnly]           = useState(false);
  const [headphonesDetected, setHeadphonesDetected] = useState(null);

  // Refs
  const audioRef         = useRef(null);
  const fileInputRef     = useRef(null);
  const artInputRef      = useRef(null);
  const extraArtInputRef = useRef(null);  // for artist/album cover upload
  const artUploadCbRef   = useRef(null);  // callback set before triggering extraArtInputRef
  const importRef        = useRef(null);
  const previewAudioRef  = useRef(null);
  const audioCtxRef      = useRef(null);
  const bassNodeRef      = useRef(null);
  const midNodeRef       = useRef(null);
  const trebleNodeRef    = useRef(null);
  const playedHistoryRef = useRef([]);
  const listContainerRef = useRef(null);
  const dragSt           = useRef(null);
  const commitDragRef    = useRef(null);

  // ─── Derived ──────────────────────────────────────────────────────────────
  const contextTracks = useMemo(() => {
    if (!activeCtxId) return tracks;
    if (activeCtxId.startsWith('artist:')) {
      const name = activeCtxId.slice(7);
      return tracks.filter(t => (t.artist || 'Unbekannt') === name);
    }
    if (activeCtxId.startsWith('album:')) {
      const [artistName, albumName] = activeCtxId.slice(6).split('||');
      return tracks.filter(t => (t.artist || 'Unbekannt') === artistName && (t.album || 'Unbekanntes Album') === albumName);
    }
    const pl = playlists.find(p => p.id === activeCtxId);
    return pl ? pl.trackIds.map(id => tracks.find(t => t.id === id)).filter(Boolean) : tracks;
  }, [tracks, playlists, activeCtxId]);

  // Build artist → { albums → tracks[] } map
  const artistMap = useMemo(() => {
    const map = new Map();
    tracks.forEach(t => {
      const artist = t.artist || 'Unbekannt';
      if (!map.has(artist)) map.set(artist, new Map());
      const albums = map.get(artist);
      const album  = t.album || 'Unbekanntes Album';
      if (!albums.has(album)) albums.set(album, []);
      albums.get(album).push(t);
    });
    return map;
  }, [tracks]);

  const currentTrack    = currentIdx !== null ? contextTracks[currentIdx] : null;
  const previewProgress = previewDuration ? (previewTime / previewDuration) * 100 : 0;
  const progress        = duration ? (currentTime / duration) * 100 : 0;

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3500); };

  useEffect(() => {
    if (currentIdx !== null && currentIdx >= contextTracks.length) setCurrentIdx(null);
  }, [contextTracks, currentIdx]);

  // ─── Load from IndexedDB ──────────────────────────────────────────────────
  useEffect(() => {
    const load = async () => {
      try {
        const [dbMeta, dbSettings, dbPlaylists] = await Promise.all([
          dbGetAll('tracksMetadata'), dbGetAll('settings'), dbGetAll('playlists'),
        ]);
        const s = {};
        const acCovers = {}, alcCovers = {};
        dbSettings.forEach(({ key, value }) => {
          if      (key.startsWith('ac:'))  acCovers[key.slice(3)]  = value;
          else if (key.startsWith('alc:')) alcCovers[key.slice(4)] = value;
          else s[key] = value;
        });
        if (Object.keys(acCovers).length)  setArtistCovers(acCovers);
        if (Object.keys(alcCovers).length) setAlbumCovers(alcCovers);

        if (s.eqBass        !== undefined) setEqBass(s.eqBass);
        if (s.eqMid         !== undefined) setEqMid(s.eqMid);
        if (s.eqTreble      !== undefined) setEqTreble(s.eqTreble);
        if (s.volume        !== undefined) { setVolume(s.volume); if (audioRef.current) audioRef.current.volume = s.volume; }
        if (s.repeat        !== undefined) setRepeat(s.repeat);
        if (s.shuffle       !== undefined) setShuffle(s.shuffle);
        if (s.headphoneOnly !== undefined) setHeadphoneOnly(s.headphoneOnly);
        if (s.activeCtxId   !== undefined) setActiveCtxId(s.activeCtxId);

        if (dbMeta.length > 0) {
          const order  = s.trackOrder || [];
          const sorted = [...order.map(id => dbMeta.find(t => t.id === id)).filter(Boolean), ...dbMeta.filter(t => !order.includes(t.id))];
          const loaded = sorted.map(t => ({ id: t.id, name: t.name, artist: t.artist || null, album: t.album || null, url: null, art: t.art || null, originalFilename: t.originalFilename || null }));
          setTracks(loaded);
          if (s.currentTrackId) {
            // Find position in the restored context, not the full library
            const restoredCtxId = s.activeCtxId;
            let ctxList;
            if (!restoredCtxId)                           ctxList = loaded;
            else if (restoredCtxId.startsWith('artist:')) ctxList = loaded.filter(t => (t.artist||'Unbekannt') === restoredCtxId.slice(7));
            else if (restoredCtxId.startsWith('album:'))  {
              const [a, al] = restoredCtxId.slice(6).split('||');
              ctxList = loaded.filter(t => (t.artist||'Unbekannt') === a && (t.album||'Unbekanntes Album') === al);
            } else {
              const pl = dbPlaylists.find(p => p.id === restoredCtxId);
              ctxList = pl ? pl.trackIds.map(id => loaded.find(t => t.id === id)).filter(Boolean) : loaded;
            }
            const idx = ctxList.findIndex(t => t.id === s.currentTrackId);
            if (idx !== -1) setCurrentIdx(idx);
          }
        }
        if (dbPlaylists.length > 0) {
          const plOrd = s.playlistOrder || [];
          setPlaylists([
            ...plOrd.map(id => dbPlaylists.find(p => p.id === id)).filter(Boolean),
            ...dbPlaylists.filter(p => !plOrd.includes(p.id)),
          ]);
        }
      } catch (err) { console.error('DB load error:', err); }
      finally { setDbLoaded(true); }
    };
    load();
  }, []);

  // ─── Auto-save settings ───────────────────────────────────────────────────
  useEffect(() => {
    if (!dbLoaded) return;
    const t = setTimeout(() => {
      const toSave = {
        eqBass, eqMid, eqTreble, volume, repeat, shuffle, headphoneOnly, activeCtxId,
        playlistOrder:  playlists.map(p => p.id),
        trackOrder:     tracks.map(t => t.id),
        currentTrackId: currentIdx !== null ? (contextTracks[currentIdx]?.id ?? null) : null,
      };
      Promise.all(Object.entries(toSave).map(([key, value]) => dbPut('settings', { key, value }))).catch(console.error);
    }, 600);
    return () => clearTimeout(t);
  }, [eqBass, eqMid, eqTreble, volume, repeat, shuffle, headphoneOnly, activeCtxId, tracks, currentIdx, dbLoaded, contextTracks, playlists]);

  // ─── Virtual scroll container messen ──────────────────────────────────────
  useEffect(() => {
    if (view !== "playlist" || !listContainerRef.current) return;
    setListHeight(listContainerRef.current.clientHeight || 500);
    setListScrollTop(0);
  }, [view, listTab, browseView]);

  const handleVolumeChange = (v) => { setVolume(v); if (audioRef.current) audioRef.current.volume = v; };

  // ─── Headphone detection ──────────────────────────────────────────────────
  const detectHeadphones = useCallback(async () => {
    if (!navigator.mediaDevices?.enumerateDevices) { setHeadphonesDetected(null); return null; }
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const outputs = devices.filter(d => d.kind === 'audiooutput');
      if (!outputs.some(d => d.label)) { setHeadphonesDetected(null); return null; }
      const found = outputs.some(d => /headphone|headset|airpod|earphone|earbuds|bluetooth|wireless/i.test(d.label));
      setHeadphonesDetected(found); return found;
    } catch { setHeadphonesDetected(null); return null; }
  }, []);

  useEffect(() => {
    if (!navigator.mediaDevices) return;
    detectHeadphones();
    navigator.mediaDevices.addEventListener('devicechange', detectHeadphones);
    return () => navigator.mediaDevices.removeEventListener('devicechange', detectHeadphones);
  }, [detectHeadphones]);

  useEffect(() => {
    if (!headphoneOnly || headphonesDetected !== false) return;
    if (playing && audioRef.current) { audioRef.current.pause(); setPlaying(false); showToast("Kopfhörer getrennt – Wiedergabe pausiert."); }
  }, [headphonesDetected, headphoneOnly, playing]);

  // ─── Playback ─────────────────────────────────────────────────────────────
  const isAudioFile = (file) =>
    file.type.includes("audio") || ["video/mp4","audio/mp4","audio/x-m4a"].includes(file.type) ||
    /\.(mp3|wav|ogg|m4a|mp4|flac|aac|opus)$/i.test(file.name);

  const playTrack = useCallback(async (idx, list) => {
    const tl  = list || contextTracks;
    let track = tl[idx];
    if (!track || !audioRef.current) return;
    if (!playedHistoryRef.current.includes(track.id)) playedHistoryRef.current.push(track.id);
    if (playedHistoryRef.current.length >= tl.length)  playedHistoryRef.current = [track.id];
    if (!track.url) {
      const blob = await loadBlob(track.id);
      if (!blob) { showToast("Audio nicht gefunden."); return; }
      const url = URL.createObjectURL(blob);
      setTracks(prev => prev.map(t => t.id === track.id ? { ...t, url } : t));
      track = { ...track, url };
    }
    audioRef.current.src = track.url;
    audioRef.current.load();
    audioRef.current.play().catch(() => {});
    setCurrentIdx(idx);
    setPlaying(true);
  }, [contextTracks]);

  const goNext = useCallback(() => {
    const ct = contextTracks;
    if (!ct.length) return;
    if (shuffle) {
      const currId = currentIdx !== null ? ct[currentIdx]?.id : null;
      let unplayed = ct.filter(t => !playedHistoryRef.current.includes(t.id) && t.id !== currId);
      if (unplayed.length === 0) { playedHistoryRef.current = []; unplayed = ct.filter(t => t.id !== currId); }
      if (unplayed.length === 0) { playTrack(0, ct); return; }
      const next = unplayed[Math.floor(Math.random() * unplayed.length)];
      playTrack(ct.findIndex(t => t.id === next.id) ?? 0, ct);
    } else { playTrack(((currentIdx ?? -1) + 1) % ct.length, ct); }
  }, [contextTracks, currentIdx, shuffle, playTrack]);

  const goPrev = useCallback(() => {
    const ct = contextTracks;
    if (!ct.length) return;
    if (audioRef.current && audioRef.current.currentTime > 3) { audioRef.current.currentTime = 0; return; }
    playTrack(((currentIdx ?? 1) - 1 + ct.length) % ct.length, ct);
  }, [contextTracks, currentIdx, playTrack]);

  const togglePlay = useCallback(async () => {
    if (!audioRef.current || !currentTrack) return;
    if (playing) { audioRef.current.pause(); setPlaying(false); return; }
    if (headphoneOnly && headphonesDetected === false) { showToast("Kopfhörer erforderlich."); return; }
    if (!currentTrack.url) {
      const blob = await loadBlob(currentTrack.id);
      if (!blob) { showToast("Audio nicht gefunden."); return; }
      const url = URL.createObjectURL(blob);
      setTracks(prev => prev.map(t => t.id === currentTrack.id ? { ...t, url } : t));
      audioRef.current.src = url;
      audioRef.current.load();
    }
    audioRef.current.play().catch(() => {});
    setPlaying(true);
  }, [playing, currentTrack, headphoneOnly, headphonesDetected]);

  useEffect(() => {
    const audio = audioRef.current;
    if (!audio) return;
    const onTime  = () => { if (!isScrubbing) setCurrentTime(audio.currentTime); };
    const onDur   = () => setDuration(audio.duration);
    const onEnded = () => { if (repeat) { audio.currentTime = 0; audio.play(); } else goNext(); };
    audio.addEventListener("timeupdate", onTime);
    audio.addEventListener("loadedmetadata", onDur);
    audio.addEventListener("ended", onEnded);
    return () => { audio.removeEventListener("timeupdate", onTime); audio.removeEventListener("loadedmetadata", onDur); audio.removeEventListener("ended", onEnded); };
  }, [goNext, repeat, isScrubbing]);

  useEffect(() => {
    if (!("mediaSession" in navigator) || !currentTrack) return;
    const ctxLabel = activeCtxId?.startsWith('artist:') ? activeCtxId.slice(7)
      : activeCtxId?.startsWith('album:') ? activeCtxId.slice(6).split('||')[0]
      : activeCtxId ? (playlists.find(p => p.id === activeCtxId)?.name || "Music")
      : "Music";
    navigator.mediaSession.metadata = new MediaMetadata({
      title: currentTrack.name,
      artist: currentTrack.artist || ctxLabel,
      album:  currentTrack.album || '',
      artwork: currentTrack.art ? [{ src: currentTrack.art, sizes: "300x300", type: "image/jpeg" }] : [],
    });
    navigator.mediaSession.setActionHandler("play",          () => { audioRef.current?.play(); setPlaying(true); });
    navigator.mediaSession.setActionHandler("pause",         () => { audioRef.current?.pause(); setPlaying(false); });
    navigator.mediaSession.setActionHandler("nexttrack",     goNext);
    navigator.mediaSession.setActionHandler("previoustrack", goPrev);
  }, [currentTrack, activeCtxId, playlists, goNext, goPrev]);

  const isImageFile = (f) => f.type.startsWith('image/') || /\.(jpe?g|png|gif|webp|avif)$/i.test(f.name);

  // ─── Track Management ─────────────────────────────────────────────────────
  const handleFiles = async (files) => {
    const all        = Array.from(files);
    const audioFiles = all.filter(isAudioFile);
    const imageFiles = all.filter(isImageFile);
    if (!audioFiles.length && !imageFiles.length) { showToast("Keine Audio- oder Bilddateien erkannt!"); return; }

    let addedTracks = [];
    if (audioFiles.length > 0) {
      const newTracks = audioFiles.map((f, i) => {
        const { name, artist, album } = parseFilename(f.name);
        return { id: `t-${Date.now()}-${i}-${Math.random().toString(36).slice(2)}`, name, artist, album, blob: f, art: null, originalFilename: f.name };
      });
      await Promise.all([
        ...newTracks.map(t => dbPut('tracks',         { id: t.id, blob: t.blob })),
        ...newTracks.map(t => dbPut('tracksMetadata', { id: t.id, name: t.name, artist: t.artist, album: t.album, art: null, originalFilename: t.originalFilename })),
      ]).catch(console.error);
      addedTracks = newTracks.map(t => ({ id: t.id, name: t.name, artist: t.artist, album: t.album, url: URL.createObjectURL(t.blob), art: null, originalFilename: t.originalFilename }));
      setTracks(prev => [...prev, ...addedTracks]);
    }

    display:"flex", alignItems:"center", padding:"12px 14px",
    borderBottom:"1px solid #1e1e1e", gap:10, flexShrink:0,
  };
  const playBtnStyle = (active) => ({
    width:"100%", background:active?"#fc3c44":"#1a1a1a",
    border:`1px solid ${active?"#fc3c44":"#2a2a2a"}`,
    borderRadius:10, color:active?"#fff":"#888",
    padding:"9px", fontSize:13, fontWeight:700, cursor:"pointer",
    display:"flex", alignItems:"center", justifyContent:"center", gap:6,
  });

  // ─── Active context label for player ─────────────────────────────────────
  const ctxLabel = activeCtxId
    ? activeCtxId.startsWith('artist:') ? activeCtxId.slice(7)
    : activeCtxId.startsWith('album:')  ? activeCtxId.slice(6).split('||')[1]
    : playlists.find(p => p.id === activeCtxId)?.name || "Playlist"
    : null;

  // ─── Render ───────────────────────────────────────────────────────────────
  return (
    <div style={{ height:"100%", display:"flex", flexDirection:"column", alignItems:"center", padding:"16px 16px 20px" }}>
      <div style={{ width:"100%", maxWidth:390, display:"flex", flexDirection:"column", flex:1, minHeight:0 }}>

        <audio ref={audioRef} preload="auto" playsInline />
        <audio ref={previewAudioRef} preload="auto" playsInline />
        <input ref={fileInputRef}     type="file" accept="audio/*, image/*, .m4a, .mp4, audio/mp4, audio/x-m4a" multiple style={{ display:"none" }} onChange={(e) => { handleFiles(e.target.files); e.target.value=""; }} />
        <input ref={artInputRef}      type="file" accept="image/*" style={{ display:"none" }} onChange={handleArtFile} />
        <input ref={extraArtInputRef} type="file" accept="image/*" style={{ display:"none" }} onChange={handleExtraArt} />
        <input ref={importRef}        type="file" accept=".json,application/json,audio/*,.m4a,.mp3,.wav,.ogg,.flac,.aac,.opus,.mp4" multiple style={{ display:"none" }} onChange={importBackup} />

        {toast && (
          <div style={{ position:"absolute", top:16, left:"50%", transform:"translateX(-50%)", background:"#1a1a1a", border:"1px solid #333", color:"#fff", padding:"10px 20px", borderRadius:12, fontSize:13, zIndex:100, textAlign:"center", width:"90%", maxWidth:320 }}>
            {toast}
          </div>
        )}

        {/* Header */}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20, flexShrink:0 }}>
          <div>
            <h1 style={{ fontSize:24, fontWeight:800 }}>Music</h1>
            {dbLoaded && tracks.length > 0 && (
              <div style={{ fontSize:10, color:"#3a3a3a", marginTop:3, fontWeight:600, letterSpacing:"0.04em" }}>
                ⚡ {tracks.length} Titel · {playlists.length} Playlist{playlists.length !== 1 ? 's' : ''}
              </div>
            )}
          </div>
          <button onClick={() => fileInputRef.current?.click()} style={{ background:"#fc3c44", border:"none", borderRadius:12, color:"#fff", padding:"6px 12px", fontSize:12, fontWeight:600, cursor:"pointer" }}>
            + Musik laden
          </button>
        </div>

        {/* Main Tabs */}
        <div style={{ display:"flex", background:"#111", borderRadius:10, padding:3, marginBottom:20, border:"1px solid #222", flexShrink:0 }}>
          {["player","playlist","tuning"].map(v => (
            <button key={v} onClick={() => setView(v)} style={{ flex:1, padding:"8px 0", borderRadius:8, border:"none", cursor:"pointer", fontSize:11, fontWeight:600, background:view===v?"#222":"transparent", color:view===v?"#fff":"#666" }}>
              {v==="player" ? "Jetzt läuft" : v==="playlist" ? "Titelliste" : "Einstellungen"}
            </button>
          ))}
        </div>

        {/* ── PLAYER ── */}
        {view === "player" && (
          <div className="flat-card" style={{ padding:"24px", flex:1, overflowY:"auto" }}>
            <div style={{ width:"100%", aspectRatio:"1", borderRadius:12, marginBottom:24, overflow:"hidden", background:"#181818", display:"flex", alignItems:"center", justifyContent:"center", border:"1px solid #222", position:"relative" }}>
              {currentTrack?.art ? <img src={currentTrack.art} alt="cover" style={{ width:"100%", height:"100%", objectFit:"cover" }} /> : <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#333" strokeWidth="1.5" strokeLinecap="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>}
              {currentTrack && <button onClick={() => artInputRef.current?.click()} style={{ position:"absolute", bottom:12, right:12, background:"rgba(0,0,0,0.7)", border:"1px solid #333", borderRadius:8, color:"#fff", padding:"4px 8px", fontSize:11, cursor:"pointer" }}>Cover ändern</button>}
            </div>
            {ctxLabel && (
              <div style={{ fontSize:10, color:"#fc3c44", fontWeight:700, letterSpacing:"0.08em", marginBottom:6 }}>
                ▶ {ctxLabel}
              </div>
            )}
            <div style={{ marginBottom:20 }}>
              <div style={{ fontSize:18, fontWeight:800, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                {currentTrack ? currentTrack.name : "Kein Titel geladen"}
              </div>
              {currentTrack?.artist && (
                <div style={{ fontSize:14, color:"#ccc", marginTop:3, fontWeight:600, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                  {currentTrack.artist}
                </div>
              )}
              {currentTrack?.album && (
                <div style={{ fontSize:12, color:"#555", marginTop:2, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                  {currentTrack.album}
                </div>
              )}
              <div style={{ fontSize:12, color:"#555", marginTop:4 }}>
                {currentTrack ? `Titel ${(currentIdx ?? 0)+1} von ${contextTracks.length}` : "Füge Musik im Tab 'Titelliste' hinzu"}
              </div>
            </div>
            <div style={{ marginBottom:24 }}>
              <input type="range" min="0" max={duration||100} value={currentTime}
                onMouseDown={() => setIsScrubbing(true)} onMouseUp={() => setIsScrubbing(false)}
                onTouchStart={() => setIsScrubbing(true)} onTouchEnd={() => setIsScrubbing(false)}
                onChange={(e) => { const v=parseFloat(e.target.value); setCurrentTime(v); if(audioRef.current) audioRef.current.currentTime=v; }}
                style={{ width:"100%", marginBottom:8, background:`linear-gradient(to right,#fc3c44 ${progress}%,#222 ${progress}%)` }} />
              <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"#555" }}>
                <span>{formatTime(currentTime)}</span><span>-{formatTime(duration-currentTime)}</span>
              </div>
            </div>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20 }}>
              <button onClick={() => setShuffle(s=>!s)} className="icon-btn" style={{ color:shuffle?"#fc3c44":"#444" }}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
              </button>
              <button onClick={goPrev} className="icon-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" strokeWidth="2.5"/></svg>
              </button>
              <button onClick={togglePlay} className="icon-btn" style={{ width:56, height:56, borderRadius:"50%", background:"#fff", color:"#000" }}>
                {playing ? <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="4" width="4" height="16" rx="1"/><rect x="15" y="4" width="4" height="16" rx="1"/></svg>
                         : <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style={{ marginLeft:2 }}><polygon points="6 3 20 12 6 21 6 3"/></svg>}
              </button>
              <button onClick={goNext} className="icon-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" strokeWidth="2.5"/></svg>
              </button>
              <button onClick={() => setRepeat(r=>!r)} className="icon-btn" style={{ color:repeat?"#fc3c44":"#444" }}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
              </button>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#444" strokeWidth="2.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/></svg>
              <input type="range" min="0" max="1" step="0.05" value={volume}
                onChange={(e) => handleVolumeChange(parseFloat(e.target.value))}
                onInput={(e) => handleVolumeChange(parseFloat(e.target.value))}
                style={{ flex:1, background:`linear-gradient(to right,#fc3c44 ${volume*100}%,#222 ${volume*100}%)` }} />
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#444" strokeWidth="2.5"><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            </div>
          </div>
        )}

        {/* ── TITELLISTE ── */}
        {view === "playlist" && (
          <div style={{ flex:1, display:"flex", flexDirection:"column", minHeight:0 }}>

            {/* Sub-tabs: Titel | Künstler | Playlists */}
            <div style={{ display:"flex", background:"#111", borderRadius:10, padding:3, marginBottom:12, border:"1px solid #222", flexShrink:0 }}>
              {[['songs','Titel'],['artists','Künstler'],['playlists','Playlists']].map(([tab, label]) => (
                <button key={tab} onClick={() => {
                  setListTab(tab);
                  setBrowseView(tab === 'playlists' ? 'home' : '');
                }} style={{ flex:1, padding:"8px 0", borderRadius:8, border:"none", cursor:"pointer", fontSize:11, fontWeight:600, background:listTab===tab?"#222":"transparent", color:listTab===tab?"#fff":"#666" }}>
                  {label}
                </button>
              ))}
            </div>

            {/* ══ TITEL TAB ══ */}

            {/* All tracks list */}
            {listTab === 'songs' && browseView === '' && (
              <div className="flat-card" style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
                <div style={{ display:"flex", alignItems:"center", padding:"10px 14px", borderBottom:"1px solid #1e1e1e", flexShrink:0 }}>
                  <span style={{ fontSize:12, color:"#444", fontWeight:600 }}>{tracks.length} Titel</span>
                </div>
                <div ref={listContainerRef} onScroll={(e) => setListScrollTop(e.currentTarget.scrollTop)} style={{ flex:1, overflowY:"auto", position:"relative" }}>
                  <div style={{ height:totalListH, position:"relative" }}>
                    {tracks.length === 0 && (
                      <div style={{ padding:32, textAlign:"center", color:"#444", fontSize:13 }}>
                        Noch keine Musik. Tippe oben auf „+ Musik laden".
                      </div>
                    )}
                    {Array.from({ length: Math.max(0, vsEnd-vsStart+1) }, (_, vi) => {
                      const i = vsStart + vi;
                      if (i >= tracks.length) return null;
                      const t = tracks[i];
                      const isCurrent = !activeCtxId && contextTracks[currentIdx]?.id === t.id;
                      const isLibDrag  = dContext === 'library';
                      const isLibDrop  = isLibDrag && dDropIdx === i && dActiveIdx !== null && dActiveIdx !== i;
                      return (
                        <div key={t.id}
                          style={{ position:"absolute", top:i*ITEM_H, left:0, right:0, height:ITEM_H,
                            display:"flex", alignItems:"center", padding:"0 8px 0 2px", gap:6,
                            background:(isLibDrag && dActiveIdx===i) ? "#1e1e1e" : isCurrent ? "#1a1a1a" : "transparent",
                            borderTop:(isLibDrop && dDropIdx < dActiveIdx) ? '2px solid #fc3c44' : undefined,
                            borderBottom:(isLibDrop && dDropIdx >= dActiveIdx) ? '2px solid #fc3c44' : '1px solid #1a1a1a',
                            boxSizing:"border-box" }}>
                          <div onPointerDown={e => { e.stopPropagation(); startDrag(e, i, tracks.length, moveTrackTo, 'library'); }}
                            style={{ padding:"4px 6px", cursor:"grab", flexShrink:0, touchAction:"none" }}>
                            <GripIcon />
                          </div>
                          <div onClick={() => { setActiveCtxId(null); playTrack(i, tracks); setView("player"); }}
                            style={{ display:"flex", alignItems:"center", gap:10, flex:1, minWidth:0, cursor:"pointer" }}>
                            <TrackThumbnail art={t.art} />
                            <div style={{ flex:1, minWidth:0 }}>
                              <div style={{ fontSize:14, fontWeight:isCurrent?800:500, color:isCurrent?"#fc3c44":"#fff", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{t.name}</div>
                              {t.artist && <div style={{ fontSize:11, color:"#555", marginTop:1, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{t.artist}{t.album ? ` · ${t.album}` : ''}</div>}
                            </div>
                          </div>
                          <div style={{ display:"flex", gap:4 }} onClick={ev => ev.stopPropagation()}>
                            {playlists.length > 0 && (
                              <button onClick={() => {
                                if (playlists.length === 1) { addTrackToPlaylist(playlists[0].id, t.id); showToast(`Zu "${playlists[0].name}" hinzugefügt`); }
                                else { setBrowseView(`addto:${t.id}`); }
                              }} style={{ background:"#1e1e1e", border:"1px solid #2a2a2a", borderRadius:6, color:"#888", fontSize:12, fontWeight:700, width:28, height:28, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>+</button>
                            )}
                            <button onClick={ev => removeTrack(i, ev)} style={{ background:"none", border:"none", color:"#555", fontSize:18, cursor:"pointer", width:28, height:28, display:"flex", alignItems:"center", justifyContent:"center" }}>×</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}

            {/* Add to playlist picker (from songs tab) */}
            {listTab === 'songs' && browseView.startsWith('addto:') && (() => {
              const trackId = browseView.split(':')[1];
              const t = tracks.find(tr => tr.id === trackId);
              return (
                <div className="flat-card" style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
                  <div style={subHeaderStyle}>
                    <button onClick={() => setBrowseView('')} className="icon-btn" style={{ color:"#666" }}><BackArrow /></button>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:13, fontWeight:700 }}>Zu Playlist hinzufügen</div>
                      <div style={{ fontSize:11, color:"#555" }}>{t?.name}</div>
                    </div>
                  </div>
                  <div style={{ flex:1, overflowY:"auto" }}>
                    {playlists.map(pl => {
                      const alreadyIn = pl.trackIds.includes(trackId);
                      return (
                        <div key={pl.id} onClick={() => { if (!alreadyIn) { addTrackToPlaylist(pl.id, trackId); showToast(`Zu "${pl.name}" hinzugefügt`); } setBrowseView(''); }}
                          style={{ display:"flex", alignItems:"center", padding:"14px 16px", gap:12, borderBottom:"1px solid #1a1a1a", cursor:alreadyIn?"default":"pointer", opacity:alreadyIn?0.4:1 }}>
                          <div style={{ flex:1, fontSize:14, fontWeight:600 }}>{pl.name}</div>
                          <div style={{ fontSize:12, color:alreadyIn?"#555":"#fc3c44", fontWeight:700 }}>{alreadyIn ? "Bereits drin" : "+ Hinzufügen"}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })()}

            {/* ══ KÜNSTLER TAB ══ */}

            {/* Artist list */}
            {listTab === 'artists' && browseView === '' && (
              <div className="flat-card" style={{ flex:1, overflowY:"auto" }}>
                {artistMap.size === 0 ? (
                  <div style={{ padding:32, textAlign:"center", color:"#444", fontSize:13 }}>
                    Keine Titel mit Künstler-Info.<br />
                    <span style={{ fontSize:11, color:"#333" }}>Format: Titel_Künstler_Album.mp3</span>
                  </div>
                ) : [...artistMap.entries()].sort(([a],[b]) => a.localeCompare(b)).map(([artistName, albums]) => {
                  const trackCount = [...albums.values()].reduce((s, ts) => s + ts.length, 0);
                  const cover = artistCovers[artistName] || [...albums.values()].flat().find(t => t.art)?.art || null;
                  const isActive = activeCtxId === `artist:${artistName}`;
                  return (
                    <div key={artistName} onClick={() => setBrowseView(`artist:${artistName}`)}
                      style={{ display:"flex", alignItems:"center", padding:"10px 14px", gap:12, borderBottom:"1px solid #1a1a1a", cursor:"pointer", background:isActive?"#0d0d0d":"transparent" }}>
                      <TrackThumbnail art={cover} size={48} />
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontSize:14, fontWeight:700, color:isActive?"#fc3c44":"#fff", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{artistName}</div>
                        <div style={{ fontSize:11, color:"#555", marginTop:2 }}>{albums.size} Album{albums.size!==1?"s":""} · {trackCount} Titel</div>
                      </div>
                      {isActive && <div style={{ fontSize:10, color:"#fc3c44", fontWeight:700 }}>▶</div>}
                      <ChevronRight />
                    </div>
                  );
                })}
              </div>
            )}

            {/* Artist detail */}
            {listTab === 'artists' && browseView.startsWith('artist:') && !browseView.startsWith('artist:') && null /* placeholder */}
            {listTab === 'artists' && (() => {
              if (!browseView.startsWith('artist:') || browseView.startsWith('album:')) return null;
              const artistName = browseView.slice(7);
              const albums = artistMap.get(artistName);
              if (!albums) return null;
              const artistCover = artistCovers[artistName] || [...albums.values()].flat().find(t => t.art)?.art || null;
              const totalTracks = [...albums.values()].reduce((s, ts) => s + ts.length, 0);
              const isActive = activeCtxId === `artist:${artistName}`;
              const allArtistTracks = [...albums.values()].flat();
              return (
                <div className="flat-card" style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
                  <div style={subHeaderStyle}>
                    <button onClick={() => setBrowseView('')} className="icon-btn" style={{ color:"#666" }}><BackArrow /></button>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:15, fontWeight:800, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{artistName}</div>
                      <div style={{ fontSize:11, color:"#555" }}>{albums.size} Alben · {totalTracks} Titel{isActive ? " · Aktiv" : ""}</div>
                    </div>
                    <CoverUploadBtn onPick={() => {
                      artUploadCbRef.current = (b64) => setArtistCover(artistName, b64);
                      extraArtInputRef.current?.click();
                    }} />
                  </div>

                  {/* Artist cover */}
                  {artistCover && (
                    <div style={{ padding:"14px 16px 0", flexShrink:0 }}>
                      <div style={{ width:72, height:72, borderRadius:36, overflow:"hidden", border:"2px solid #222" }}>
                        <img src={artistCover} style={{ width:"100%", height:"100%", objectFit:"cover" }} />
                      </div>
                    </div>
                  )}

                  {/* Play all */}
                  <div style={{ padding:"12px 14px", flexShrink:0 }}>
                    <button onClick={() => { setActiveCtxId(`artist:${artistName}`); playTrack(0, allArtistTracks); setView("player"); }}
                      style={playBtnStyle(isActive)}>
                      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                      {isActive ? "Wird gespielt" : "Alle abspielen"}
                    </button>
                  </div>

                  {/* Album list */}
                  <div style={{ flex:1, overflowY:"auto" }}>
                    {[...albums.entries()].map(([albumName, albumTracks]) => {
                      const albumKey   = `${artistName}||${albumName}`;
                      const albumCover = albumCovers[albumKey] || albumTracks.find(t => t.art)?.art || null;
                      const isAlbActive = activeCtxId === `album:${albumKey}`;
                      return (
                        <div key={albumName} onClick={() => setBrowseView(`album:${albumKey}`)}
                          style={{ display:"flex", alignItems:"center", padding:"10px 14px", gap:12, borderBottom:"1px solid #1a1a1a", cursor:"pointer", background:isAlbActive?"#0d0d0d":"transparent" }}>
                          <TrackThumbnail art={albumCover} size={48} />
                          <div style={{ flex:1, minWidth:0 }}>
                            <div style={{ fontSize:14, fontWeight:600, color:isAlbActive?"#fc3c44":"#fff", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{albumName}</div>
                            <div style={{ fontSize:11, color:"#555", marginTop:2 }}>{albumTracks.length} Titel</div>
                          </div>
                          {isAlbActive && <div style={{ fontSize:10, color:"#fc3c44", fontWeight:700 }}>▶</div>}
                          <ChevronRight />
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })()}

            {/* Album detail */}
            {listTab === 'artists' && browseView.startsWith('album:') && (() => {
              const [artistName, albumName] = browseView.slice(6).split('||');
              const albumKey    = `${artistName}||${albumName}`;
              const albumTracks = tracks.filter(t => (t.artist||'Unbekannt') === artistName && (t.album||'Unbekanntes Album') === albumName);
              const albumCover  = albumCovers[albumKey] || albumTracks.find(t => t.art)?.art || null;
              const isActive    = activeCtxId === `album:${albumKey}`;
              return (
                <div className="flat-card" style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
                  <div style={subHeaderStyle}>
                    <button onClick={() => setBrowseView(`artist:${artistName}`)} className="icon-btn" style={{ color:"#666" }}><BackArrow /></button>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:15, fontWeight:800, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{albumName}</div>
                      <div style={{ fontSize:11, color:"#555" }}>{artistName} · {albumTracks.length} Titel{isActive ? " · Aktiv" : ""}</div>
                    </div>
                    <CoverUploadBtn onPick={() => {
                      artUploadCbRef.current = (b64) => setAlbumCover(artistName, albumName, b64);
                      extraArtInputRef.current?.click();
                    }} />
                  </div>

                  {/* Album cover */}
                  {albumCover && (
                    <div style={{ padding:"14px 16px 0", flexShrink:0 }}>
                      <div style={{ width:72, height:72, borderRadius:10, overflow:"hidden", border:"1px solid #222" }}>
                        <img src={albumCover} style={{ width:"100%", height:"100%", objectFit:"cover" }} />
                      </div>
                    </div>
                  )}

                  {/* Play all */}
                  {albumTracks.length > 0 && (
                    <div style={{ padding:"12px 14px", flexShrink:0 }}>
                      <button onClick={() => { setActiveCtxId(`album:${albumKey}`); playTrack(0, albumTracks); setView("player"); }}
                        style={playBtnStyle(isActive)}>
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                        {isActive ? "Wird gespielt" : "Wiedergabe"}
                      </button>
                    </div>
                  )}

                  {/* Track list */}
                  <div style={{ flex:1, overflowY:"auto" }}>
                    {albumTracks.map((t, i) => {
                      const isCur = isActive && contextTracks[currentIdx]?.id === t.id;
                      return (
                        <div key={t.id} onClick={() => { setActiveCtxId(`album:${albumKey}`); playTrack(i, albumTracks); setView("player"); }}
                          style={{ display:"flex", alignItems:"center", padding:"10px 14px", gap:12, borderBottom:"1px solid #1a1a1a", cursor:"pointer", background:isCur?"#1a1a1a":"transparent" }}>
                          <div style={{ width:24, textAlign:"center", fontSize:12, color:isCur?"#fc3c44":"#444", fontWeight:isCur?800:400, flexShrink:0 }}>
                            {isCur ? <svg width="10" height="10" viewBox="0 0 24 24" fill="#fc3c44"><polygon points="6 3 20 12 6 21 6 3"/></svg> : i+1}
                          </div>
                          <div style={{ flex:1, minWidth:0 }}>
                            <div style={{ fontSize:14, fontWeight:isCur?800:500, color:isCur?"#fc3c44":"#fff", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{t.name}</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })()}

            {/* ══ PLAYLISTS TAB ══ */}

            {/* Playlist home */}
            {listTab === 'playlists' && browseView === 'home' && (
              <div className="flat-card" style={{ flex:1, overflowY:"auto" }}>
                {playlists.map((pl, plIdx) => {
                  const count    = pl.trackIds.filter(id => tracks.some(t => t.id === id)).length;
                  const isActive = activeCtxId === pl.id;
                  const isThis   = dContext === 'home' && dActiveIdx === plIdx;
                  const isDrop   = dContext === 'home' && dDropIdx === plIdx && dActiveIdx !== null && dActiveIdx !== plIdx;
                  return (
                    <div key={pl.id}
                      style={{ display:"flex", alignItems:"center", padding:"10px 10px 10px 6px", gap:8, borderBottom:"1px solid #1a1a1a",
                        borderTop: isDrop && dDropIdx < dActiveIdx ? '2px solid #fc3c44' : undefined,
                        borderBottomColor: isDrop && dDropIdx >= dActiveIdx ? '#fc3c44' : '#1a1a1a',
                        background:isActive?"#0d0d0d":"transparent", userSelect:"none" }}>
                      <div onPointerDown={e => { e.stopPropagation(); startDrag(e, plIdx, playlists.length, movePlTo, 'home'); }}
                        style={{ padding:"4px 6px", cursor:"grab", flexShrink:0, touchAction:"none" }}>
                        <GripIcon />
                      </div>
                      <div onClick={() => setBrowseView(pl.id)} style={{ display:"flex", alignItems:"center", gap:10, flex:1, minWidth:0, cursor:"pointer" }}>
                        <PlaylistCover pl={pl} size={44} />
                        <div style={{ minWidth:0 }}>
                          <div style={{ fontSize:14, fontWeight:700, color:isActive?"#fc3c44":"#fff", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{pl.name}</div>
                          <div style={{ fontSize:11, color:"#555", marginTop:2 }}>{count} Titel{isActive ? " · Aktiv" : ""}</div>
                        </div>
                      </div>
                      <div onClick={() => setBrowseView(pl.id)} style={{ cursor:"pointer", flexShrink:0 }}><ChevronRight /></div>
                    </div>
                  );
                })}

                {/* New playlist */}
                <div style={{ padding:"14px 16px" }}>
                  {showNewPlInput ? (
                    <div style={{ display:"flex", gap:8 }}>
                      <input autoFocus value={newPlName} onChange={e => setNewPlName(e.target.value)}
                        onKeyDown={e => { if(e.key==='Enter') createPlaylist(); if(e.key==='Escape') { setShowNewPlInput(false); setNewPlName(''); } }}
                        placeholder="Playlist-Name"
                        style={{ flex:1, background:"#1a1a1a", border:"1px solid #333", borderRadius:10, padding:"8px 12px", color:"#fff", fontSize:13, outline:"none" }} />
                      <button onClick={createPlaylist} style={{ background:"#fc3c44", border:"none", borderRadius:10, color:"#fff", padding:"8px 14px", fontSize:13, fontWeight:600, cursor:"pointer" }}>Erstellen</button>
                      <button onClick={() => { setShowNewPlInput(false); setNewPlName(''); }} style={{ background:"#222", border:"none", borderRadius:10, color:"#666", padding:"8px 12px", fontSize:13, cursor:"pointer" }}>✕</button>
                    </div>
                  ) : (
                    <button onClick={() => setShowNewPlInput(true)}
                      style={{ width:"100%", background:"none", border:"1px dashed #2a2a2a", borderRadius:12, color:"#555", padding:"10px", fontSize:13, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
                      <span style={{ fontSize:16, lineHeight:1 }}>+</span> Neue Playlist
                    </button>
                  )}
                </div>
              </div>
            )}

            {/* Playlist detail */}
            {listTab === 'playlists' && playlists.some(p => p.id === browseView) && (() => {
              const pl = playlists.find(p => p.id === browseView);
              const plTracks = pl.trackIds.map(id => tracks.find(t => t.id === id)).filter(Boolean);
              const isActive = activeCtxId === pl.id;
              return (
                <div className="flat-card" style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
                  <div style={subHeaderStyle}>
                    <button onClick={() => setBrowseView('home')} className="icon-btn" style={{ color:"#666" }}><BackArrow /></button>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:15, fontWeight:800, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{pl.name}</div>
                      <div style={{ fontSize:11, color:"#555", marginTop:1 }}>{plTracks.length} Titel{isActive ? " · Wird gespielt" : ""}</div>
                    </div>
                    <button onClick={() => deletePlaylist(pl.id)} className="icon-btn" style={{ color:"#444" }}>
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                    </button>
                  </div>
                  {plTracks.length > 0 && (
                    <div style={{ padding:"10px 14px", borderBottom:"1px solid #1a1a1a", flexShrink:0 }}>
                      <button onClick={() => { setActiveCtxId(pl.id); playTrack(0, plTracks); setView("player"); }} style={playBtnStyle(isActive)}>
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                        {isActive ? "Wird gespielt" : "Wiedergabe"}
                      </button>
                    </div>
                  )}
                  <div ref={listContainerRef} onScroll={(e) => setListScrollTop(e.currentTarget.scrollTop)} style={{ flex:1, overflowY:"auto" }}>
                    {plTracks.length === 0 ? (
                      <div style={{ padding:32, textAlign:"center", color:"#444", fontSize:12 }}>Noch keine Titel. Tippe unten auf „+ Titel hinzufügen".</div>
                    ) : plTracks.map((t, i) => {
                      const isCur   = isActive && contextTracks[currentIdx]?.id === t.id;
                      const isPlDrop = dContext === pl.id && dDropIdx === i && dActiveIdx !== null && dActiveIdx !== i;
                      return (
                        <div key={t.id}
                          style={{ display:"flex", alignItems:"center", padding:"10px 8px 10px 2px", gap:6,
                            background:(dContext===pl.id && dActiveIdx===i) ? "#1e1e1e" : isCur ? "#1a1a1a" : "transparent",
                            borderTop:(isPlDrop && dDropIdx < dActiveIdx) ? '2px solid #fc3c44' : undefined,
                            borderBottom:(isPlDrop && dDropIdx >= dActiveIdx) ? '2px solid #fc3c44' : '1px solid #1a1a1a' }}>
                          <div onPointerDown={e => { e.stopPropagation(); startDrag(e, i, plTracks.length, (from, to) => moveTrackInPlaylistTo(pl.id, from, to), pl.id); }}
                            style={{ padding:"4px 6px", cursor:"grab", flexShrink:0, touchAction:"none" }}>
                            <GripIcon />
                          </div>
                          <div onClick={() => { setActiveCtxId(pl.id); playTrack(i, plTracks); setView("player"); }}
                            style={{ display:"flex", alignItems:"center", gap:10, flex:1, minWidth:0, cursor:"pointer" }}>
                            <TrackThumbnail art={t.art} />
                            <div style={{ flex:1, minWidth:0 }}>
                              <div style={{ fontSize:14, fontWeight:isCur?800:500, color:isCur?"#fc3c44":"#fff", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{t.name}</div>
                              {t.artist && <div style={{ fontSize:11, color:"#555", marginTop:1, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{t.artist}{t.album ? ` · ${t.album}` : ''}</div>}
                            </div>
                          </div>
                          <div style={{ display:"flex", gap:4 }} onClick={ev => ev.stopPropagation()}>
                            <button onClick={() => removeTrackFromPlaylist(pl.id, t.id)} style={{ background:"none", border:"none", color:"#555", fontSize:18, cursor:"pointer", width:28, height:28, display:"flex", alignItems:"center", justifyContent:"center" }}>×</button>
                          </div>
                        </div>
                      );
                    })}
                    <div style={{ padding:"12px 14px" }}>
                      <button onClick={() => setBrowseView(`picker:${pl.id}`)}
                        style={{ width:"100%", background:"none", border:"1px dashed #2a2a2a", borderRadius:10, color:"#555", padding:"9px", fontSize:13, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
                        <span style={{ fontSize:16 }}>+</span> Titel hinzufügen
                      </button>
                    </div>
                  </div>
                </div>
              );
            })()}

            {/* Track picker for playlist */}
            {listTab === 'playlists' && browseView.startsWith('picker:') && (() => {
              const plId = browseView.split(':')[1];
              const pl   = playlists.find(p => p.id === plId);
              const available = tracks.filter(t => !pl?.trackIds.includes(t.id));
              return (
                <div className="flat-card" style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
                  <div style={subHeaderStyle}>
                    <button onClick={() => setBrowseView(plId)} className="icon-btn" style={{ color:"#666" }}><BackArrow /></button>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:13, fontWeight:700 }}>Zu „{pl?.name}" hinzufügen</div>
                      <div style={{ fontSize:11, color:"#555", marginTop:1 }}>{available.length} verfügbar</div>
                    </div>
                  </div>
                  <div style={{ flex:1, overflowY:"auto" }}>
                    {available.length === 0 ? (
                      <div style={{ padding:32, textAlign:"center", color:"#444", fontSize:12 }}>Alle Titel sind bereits in dieser Playlist.</div>
                    ) : available.map(t => (
                      <div key={t.id} onClick={() => { addTrackToPlaylist(plId, t.id); showToast(`"${t.name}" hinzugefügt`); }}
                        style={{ display:"flex", alignItems:"center", padding:"10px 14px", gap:12, borderBottom:"1px solid #1a1a1a", cursor:"pointer" }}>
                        <TrackThumbnail art={t.art} />
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontSize:14, fontWeight:500, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{t.name}</div>
                          {t.artist && <div style={{ fontSize:11, color:"#555", marginTop:1 }}>{t.artist}</div>}
                        </div>
                        <div style={{ fontSize:14, color:"#fc3c44", fontWeight:700, paddingLeft:8 }}>+</div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })()}

          </div>
        )}

        {/* ── EINSTELLUNGEN ── */}
        {view === "tuning" && (
          <div className="flat-card" style={{ flex:1, overflowY:"auto", padding:"24px" }}>

            <div style={{ marginBottom:32 }}>
              <h3 style={{ fontSize:18, fontWeight:800, marginBottom:20 }}>Allgemein</h3>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                <div>
                  <div style={{ fontSize:13, fontWeight:600, color:"#fff", marginBottom:3 }}>Nur mit Kopfhörern</div>
                  <div style={{ fontSize:11, color:"#555", lineHeight:1.5 }}>
                    {headphonesDetected===true && "🎧 Kopfhörer erkannt"}{headphonesDetected===false && "🔈 Kein Kopfhörer erkannt"}{headphonesDetected===null && "Status unbekannt"}
                  </div>
                </div>
                <button onClick={() => setHeadphoneOnly(v=>!v)}
                  style={{ width:44, height:26, borderRadius:13, background:headphoneOnly?"#fc3c44":"#2a2a2a", border:`1px solid ${headphoneOnly?"#fc3c44":"#444"}`, cursor:"pointer", position:"relative", flexShrink:0, transition:"all 0.2s" }}>
                  <div style={{ width:18, height:18, borderRadius:"50%", background:"#fff", position:"absolute", top:3, left:headphoneOnly?22:3, transition:"left 0.2s" }} />
                </button>
              </div>
              {headphoneOnly && headphonesDetected===null && (
                <div style={{ marginTop:12, fontSize:11, color:"#555", lineHeight:1.6 }}>Kopfhörererkennung benötigt Browser-Berechtigung. Auf iOS nicht verfügbar.</div>
              )}
            </div>

            <div style={{ marginBottom:32 }}>
              <h3 style={{ fontSize:18, fontWeight:800, marginBottom:8 }}>Song-Tuner</h3>
              <p style={{ fontSize:12, color:"#666", marginBottom:20 }}>Wähle einen Titel, stelle den EQ ein, höre live rein — und exportiere dann die fertige Datei.</p>
              <div style={{ marginBottom:20 }}>
                <label style={{ display:"block", fontSize:12, fontWeight:600, color:"#888", marginBottom:8 }}>Titel auswählen:</label>
                <select value={renderTrackIdx} onChange={e => setRenderTrackIdx(e.target.value)}
                  style={{ width:"100%", background:"#1a1a1a", border:"1px solid #333", borderRadius:10, padding:"10px", color:"#fff", fontSize:13, outline:"none" }}>
                  <option value="">-- Bitte wählen --</option>
                  {tracks.map((t,i) => <option key={t.id} value={i}>{t.name}{t.artist ? ` – ${t.artist}` : ''}</option>)}
                </select>
              </div>
              {[{label:"Bass (150Hz)",val:eqBass,set:setEqBass},{label:"Mitten (1kHz)",val:eqMid,set:setEqMid},{label:"Höhen (4kHz)",val:eqTreble,set:setEqTreble}].map((band,i) => (
                <div key={i} style={{ marginBottom:20 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:"#666", marginBottom:6 }}>
                    <span>{band.label}</span>
                    <span style={{ color:"#fc3c44", fontWeight:700 }}>{band.val>0?`+${band.val}`:band.val} dB</span>
                  </div>
                  <input type="range" min="-12" max="12" step="1" value={band.val} onChange={e => band.set(parseInt(e.target.value))}
                    style={{ width:"100%", background:`linear-gradient(to right,#fc3c44 ${((band.val+12)/24)*100}%,#222 ${((band.val+12)/24)*100}%)` }} />
                </div>
              ))}
              {renderTrackIdx !== "" && (
                <div style={{ borderTop:"1px solid #1e1e1e", paddingTop:20, marginBottom:20 }}>
                  <div style={{ fontSize:10, fontWeight:600, color:"#3a3a3a", letterSpacing:"0.1em", marginBottom:12 }}>LIVE-VORSCHAU</div>
                  <div style={{ fontSize:14, fontWeight:700, color:previewPlaying?"#fc3c44":"#ccc", marginBottom:14, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{tracks[parseInt(renderTrackIdx)]?.name}</div>
                  <div style={{ marginBottom:16 }}>
                    <input type="range" min="0" max={previewDuration||100} value={previewTime}
                      onMouseDown={() => setPreviewScrubbing(true)} onMouseUp={() => setPreviewScrubbing(false)}
                      onTouchStart={() => setPreviewScrubbing(true)} onTouchEnd={() => setPreviewScrubbing(false)}
                      onChange={(e) => { const v=parseFloat(e.target.value); setPreviewTime(v); if(previewAudioRef.current) previewAudioRef.current.currentTime=v; }}
                      style={{ width:"100%", marginBottom:6, background:`linear-gradient(to right,#fc3c44 ${previewProgress}%,#222 ${previewProgress}%)` }} />
                    <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"#555" }}>
                      <span>{formatTime(previewTime)}</span><span>-{formatTime(previewDuration-previewTime)}</span>
                    </div>
                  </div>
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:24 }}>
                    <button onClick={() => seekPreview(-10)} className="icon-btn" style={{ flexDirection:"column", gap:3, color:"#555" }}>
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.45"/></svg>
                      <span style={{ fontSize:9 }}>10s</span>
                    </button>
                    <button onClick={togglePreviewPlay}
                      style={{ width:52, height:52, borderRadius:"50%", background:previewPlaying?"#fc3c44":"#242424", border:`2px solid ${previewPlaying?"#fc3c44":"#333"}`, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", transition:"all 0.15s" }}>
                      {previewPlaying ? <svg width="17" height="17" viewBox="0 0 24 24" fill="#fff"><rect x="5" y="4" width="4" height="16" rx="1"/><rect x="15" y="4" width="4" height="16" rx="1"/></svg>
                                      : <svg width="17" height="17" viewBox="0 0 24 24" fill="#fff" style={{ marginLeft:2 }}><polygon points="6 3 20 12 6 21 6 3"/></svg>}
                    </button>
                    <button onClick={() => seekPreview(10)} className="icon-btn" style={{ flexDirection:"column", gap:3, color:"#555" }}>
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-3.45"/></svg>
                      <span style={{ fontSize:9 }}>10s</span>
                    </button>
                  </div>
                </div>
              )}
              <button onClick={renderAndDownloadTrack} disabled={isRendering||renderTrackIdx===""}
                style={{ width:"100%", background:renderTrackIdx===""?"#1a1a1a":"#222", color:renderTrackIdx===""?"#444":"#fff", border:`1px solid ${renderTrackIdx===""?"#222":"#444"}`, borderRadius:12, padding:"12px", fontSize:14, fontWeight:700, cursor:renderTrackIdx===""?"not-allowed":"pointer" }}>
                {isRendering ? "Berechne EQ..." : "↓  Tuned song exportieren  (m4a)"}
              </button>
            </div>

            <div>
              <h3 style={{ fontSize:18, fontWeight:800, marginBottom:8 }}>Bibliothek sichern</h3>
              <p style={{ fontSize:12, color:"#666", marginBottom:4 }}>Das Backup enthält Reihenfolge, Playlists, Covers und EQ — ohne Audiodaten.</p>
              <p style={{ fontSize:11, color:"#3a3a3a", marginBottom:20, lineHeight:1.6 }}>Import: JSON + Audiodateien gemeinsam auswählen. Playlists werden automatisch wiederhergestellt.</p>
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                <button onClick={exportBackup} disabled={isExporting||tracks.length===0}
                  style={{ width:"100%", background:tracks.length===0?"#1a1a1a":"#0f3d22", color:tracks.length===0?"#444":"#4ade80", border:`1px solid ${tracks.length===0?"#222":"#1a5c32"}`, borderRadius:12, padding:"12px", fontSize:14, fontWeight:700, cursor:tracks.length===0?"not-allowed":"pointer" }}>
                  {isExporting ? "Erstelle Backup..." : `↓  Backup exportieren  (${tracks.length} Titel, ${playlists.length} Playlists)`}
                </button>
                <button onClick={() => !isImporting && importRef.current?.click()} disabled={isImporting}
                  style={{ width:"100%", background:"#0f1f3d", color:isImporting?"#666":"#60a5fa", border:"1px solid #1a2f5c", borderRadius:12, padding:"12px", fontSize:14, fontWeight:700, cursor:isImporting?"not-allowed":"pointer" }}>
                  {isImporting ? "Importiere..." : "↑  Backup importieren"}
                </button>
                {!confirmClear ? (
                  <button onClick={() => setConfirmClear(true)} style={{ width:"100%", background:"none", color:"#444", border:"1px solid #222", borderRadius:12, padding:"12px", fontSize:14, fontWeight:700, cursor:"pointer" }}>
                    Bibliothek löschen
                  </button>
                ) : (
                  <div style={{ display:"flex", gap:8 }}>
                    <button onClick={clearLibrary} style={{ flex:1, background:"#3d0f0f", color:"#f87171", border:"1px solid #5c1a1a", borderRadius:12, padding:"12px", fontSize:13, fontWeight:700, cursor:"pointer" }}>Ja, alles löschen</button>
                    <button onClick={() => setConfirmClear(false)} style={{ flex:1, background:"#1a1a1a", color:"#888", border:"1px solid #333", borderRadius:12, padding:"12px", fontSize:13, fontWeight:700, cursor:"pointer" }}>Abbrechen</button>
                  </div>
                )}
              </div>
              <div style={{ marginTop:16, padding:"12px 14px", background:"#0d0d0d", borderRadius:10, fontSize:11, color:"#3a3a3a", lineHeight:1.7 }}>
                ⚡ Alles wird automatisch im Browser gespeichert. Das Backup sichert gegen Cache-Löschung und Gerätewechsel ab.
              </div>
            </div>
          </div>
        )}

        <div style={{ textAlign:"center", marginTop:16, fontSize:10, color:"#2a2a2a", fontWeight:600, letterSpacing:"0.06em", flexShrink:0 }}>MUSIC</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MusicPlayer />);
</script>
</body>
</html>
